<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中醫執業試題庫</title>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e2ddd8;
    --accent: #7c5c3e;
    --accent-light: #f0e8df;
    --text: #2c2416;
    --text-muted: #7a6e64;
    --answer-bg: #eaf4ea;
    --answer-border: #5a9e5a;
    --tag-bg: #ede8e2;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
          background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.65; }

  /* ── Header ── */
  header { background: var(--accent); color: #fff; padding: 18px 24px; position: sticky;
            top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
  header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

  /* ── Layout ── */
  .container { display: flex; height: calc(100vh - 62px); overflow: hidden; }
  .sidebar { width: 300px; min-width: 260px; background: var(--surface);
              border-right: 1px solid var(--border); display: flex; flex-direction: column;
              overflow: hidden; flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; padding: 20px; }

  /* ── Search & Filters ── */
  .search-box { padding: 14px; border-bottom: 1px solid var(--border); }
  .search-box input { width: 100%; padding: 8px 12px; border: 1px solid var(--border);
                       border-radius: 6px; font-size: 14px; outline: none; background: var(--bg); }
  .search-box input:focus { border-color: var(--accent); }
  .filters { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
  .filter-group label { font-size: 11px; font-weight: 600; color: var(--text-muted);
                         text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { padding: 3px 10px; border-radius: 20px; font-size: 12px; cursor: pointer;
           background: var(--tag-bg); border: 1px solid var(--border); color: var(--text-muted);
           transition: all 0.15s; user-select: none; }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip:hover:not(.active) { background: var(--accent-light); border-color: var(--accent); }

  /* ── Question List ── */
  .q-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .q-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
             transition: background 0.1s; display: flex; align-items: flex-start; gap: 10px; }
  .q-item:hover { background: var(--accent-light); }
  .q-item.active { background: var(--accent-light); border-left: 3px solid var(--accent); }
  .q-num { font-size: 11px; font-weight: 700; color: var(--accent); min-width: 28px;
            margin-top: 2px; }
  .q-preview { font-size: 13px; line-height: 1.4; flex: 1; }
  .q-meta-tag { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
  .ans-dot { width: 6px; height: 6px; border-radius: 50%; background: #5a9e5a;
              flex-shrink: 0; margin-top: 7px; }
  .no-ans-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border);
                 flex-shrink: 0; margin-top: 7px; }

  /* ── Detail Panel ── */
  .detail { background: var(--surface); border-radius: 10px; box-shadow: var(--shadow);
             padding: 24px; max-width: 800px; }
  .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .badge { padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 600;
            background: var(--accent-light); color: var(--accent); }
  .detail-q { font-size: 1.05rem; font-weight: 500; margin-bottom: 18px; line-height: 1.7; }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .opt { display: flex; align-items: flex-start; gap: 10px; padding: 9px 14px;
          border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }
  .opt.correct { background: var(--answer-bg); border-color: var(--answer-border); }
  .opt-letter { font-weight: 700; color: var(--accent); min-width: 20px; }
  .opt.correct .opt-letter { color: var(--answer-border); }
  .answer-banner { background: var(--answer-bg); border: 1px solid var(--answer-border);
                    border-radius: 6px; padding: 10px 14px; margin-bottom: 14px; font-weight: 600;
                    color: #2d6a2d; }
  .notes { font-size: 13px; color: var(--text-muted); border-top: 1px solid var(--border);
            padding-top: 12px; margin-top: 4px; }
  .notes p { margin-bottom: 4px; }
  .empty { text-align: center; color: var(--text-muted); padding: 60px 20px; font-size: 14px; }
  .stats-bar { display: flex; gap: 16px; padding: 10px 14px; background: var(--accent-light);
               border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-muted); }
  .stats-bar strong { color: var(--accent); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 650px) {
    .sidebar { width: 100%; max-height: 50vh; }
    .container { flex-direction: column; }
    .main { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <h1>中醫執業試題庫 &nbsp;·&nbsp; Chinese Medicine Question Bank</h1>
  <p>3,039 questions · 2007–2018 · Papers I &amp; II</p>
</header>

<div class="container">
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜尋題目… Search questions…" oninput="applyFilters()">
    </div>
    <div class="filters">
      <div class="filter-group">
        <label>Year 年份</label>
        <div class="chips" id="yearChips"></div>
      </div>
      <div class="filter-group">
        <label>Paper 卷</label>
        <div class="chips" id="paperChips"></div>
      </div>
      <div class="filter-group">
        <label>Answers 答案</label>
        <div class="chips" id="ansChips">
          <div class="chip active" data-ans="all" onclick="toggleAns(this)">All</div>
          <div class="chip" data-ans="yes" onclick="toggleAns(this)">有答案</div>
          <div class="chip" data-ans="no" onclick="toggleAns(this)">無答案</div>
        </div>
      </div>
    </div>
    <div class="stats-bar">
      <span>Showing <strong id="countShown">0</strong> of <strong>3039</strong></span>
    </div>
    <div class="q-list" id="qList"></div>
  </div>

  <div class="main">
    <div id="detailPanel" class="empty">
      ← Select a question to view details
    </div>
  </div>
</div>

) 銀翹散(輕),麻杏石甘湯(重)", "C": "痰熱閉肺", "D": "毒熱閉肺", "E": "陰虛肺熱"}, "answer": null, "notes": [], "id": 483}, {"year": 2008, "paper": "Paper 2", "question_number": 54, "question_text": "1 歲半小兒有多少牙齒:12-14", "options": {}, "answer": null, "notes": [], "id": 484}, {"year": 2008, "paper": "Paper 2", "question_number": 55, "question_text": "男,50 歲。大便溏薄,面色萎黃,腹脹腸鳴,不思飲食,神疲肢軟,喜暖 畏寒。舌淡苔白膩,脈濡緩,當選用:", "options": {"A": "脾俞、足三里、中脘、章門、天樞(針灸五版 P.239)", "B": "?", "C": "?", "D": "?", "E": "?"}, "answer": null, "notes": [], "id": 485}, {"year": 2008, "paper": "Paper 2", "question_number": 56, "question_text": "患兒出生後1 月,面目皮膚發黃持續加重,黃色晦黯,神疲,納呆嘔吐,右 脅可觸及腫塊質硬,辨證當屬:", "options": {"A": "濕熱薰蒸  清熱利濕-茵陳蒿湯", "B": "氣陽虛衰", "C": "寒濕阻滯  溫中化濕-茵陳理中湯", "D": "瘀積發黃(兒科五版 P.141)化瘀消積-血府逐瘀湯", "E": "陰傷/陰虛?"}, "answer": null, "notes": [], "id": 486}, {"year": 2008, "paper": "Paper 2", "question_number": 57, "question_text": "一小兒,全身水腫,下肢尤甚,按之深陷難起,突見頭痛眩暈,視物模糊, 昏迷,抽搐,舌紅,苔黃糙,脈弦,病機為", "options": {"A": "水氣上凌心肺  瀉肺逐水,溫陽扶正-己椒苈黃丸合參附湯", "B": "邪陷心肝  平肝潛陽,瀉火泄熱-龍膽瀉肝湯", "C": "水毒內閉  辛開苦降,僻穢解毒-溫膽湯合附子瀉心湯", "D": "肺脾氣虛  健脾益氣-參苓白朮散合玉屏風散", "E": "脾腎陽虛  溫腎健脾-真武湯 / 濟生腎氣丸"}, "answer": null, "notes": ["風水相搏-疏風利水-麻黃連橋赤小豆湯", "濕熱內侵-清熱利濕-三妙丸合導赤散"], "id": 487}, {"year": 2008, "paper": "Paper 2", "question_number": 58, "question_text": "某女,汗出惡風,稍勞尤甚,易於感冒,體倦乏力,面色少華,苔薄白,脈 細弱,治則為", "options": {"A": "益氣固表", "B": "益氣斂汗", "C": "調和營衛", "D": "補氣養血", "E": "斂汗養陰"}, "answer": null, "notes": [], "id": 488}, {"year": 2008, "paper": "Paper 2", "question_number": 59, "question_text": "某女,中風2 天,現不省人事,目合口張,鼻鼾息微,手撒肢冷,二便失禁, 脈細弱,治宜", "options": {"A": "以督脈的經穴、十二井穴為主", "B": "以任脈的經穴為主", "C": "以手足陽明經穴為主", "D": "以十二井穴、十宣為主", "E": "以督脈的經穴、十二井穴、十宣為主"}, "answer": null, "notes": [], "id": 489}, {"year": 2008, "paper": "Paper 2", "question_number": 60, "question_text": "某男,因飲食不節而見脘腹脹滿,食入更甚,噯氣厭食,便秘矢氣,苔厚膩, 脈滑實,治宜在中脘、內關、足三里加上", "options": {"A": "脾俞、胃俞", "B": "金津、玉液", "C": "豐隆", "D": "梁門、天樞", "E": "太衝"}, "answer": null, "notes": [], "id": 490}, {"year": 2008, "paper": "Paper 2", "question_number": 61, "question_text": "某男, 咳嗽一月余, 近兩天加重, 痰多, 胸悶脘滿, 納呆, 倦怠乏力, 舌苔白 膩, 脈滑, 治宜", "options": {"A": "肺俞、列缺, 合谷, 外關", "B": "肺俞、列缺, 合谷, 豐隆", "C": "肺俞, 豐隆, 太白, 太淵, 章門", "D": "肺俞, 尺澤, 陽陵泉", "E": "合谷, 尺澤, 章門, 魚際, 足三里"}, "answer": null, "notes": [], "id": 491}, {"year": 2008, "paper": "Paper 2", "question_number": 62, "question_text": "某女, 月經先後無定期, 量時多時少, 血色紫, 有血塊, 伴胸脅乳房脹痛, 苔 薄黃, 脈弦, 病機為", "options": {"A": "肝郁", "B": "腎虛", "C": "脾虛", "D": "脾虛, 肝郁", "E": "腎虛, 肝郁"}, "answer": null, "notes": [], "id": 492}, {"year": 2008, "paper": "Paper 2", "question_number": 63, "question_text": "某女, 經前腹絞痛, 拒按, 得熱痛減, 有血塊, 血塊下後痛減, 舌苔白, 脈沉 緊, 治宜", "options": {"A": "理血化瘀止痛", "B": "淸熱化瘀止痛", "C": "疏肝理血化瘀止痛", "D": "補氣養血止痛", "E": "溫經散寒, 化瘀止痛"}, "answer": null, "notes": [], "id": 493}, {"year": 2008, "paper": "Paper 2", "question_number": 64, "question_text": "患者,女,40 嵗。不易入寐,寐則易醒。心悸健忘,脘痞便溏。舌淡,苔 白, 脈細弱。當選下列何組穴位?", "options": {"A": "心俞、豐隆、太沖、大陵", "B": "神門、足竅陰、行間、風池", "C": "太沖、大陵、太溪、神門", "D": "中脘、豐隆、厲兌、隱白", "E": "神門、心偷、脾俞、三陰交 (應為心脾兩虛型)"}, "answer": null, "notes": [], "id": 494}, {"year": 2008, "paper": "Paper 2", "question_number": 65, "question_text": "患者,60 嵗,女。手腕掌屈位,手背著地跌傷半天疼痛、腫脹、畸型。腕 關節活動障礙。根據患者受傷體位,應為:", "options": {"A": "手月骨骨折", "B": "手腕舟骨骨折", "C": "掌骨骨折", "D": "橈骨下端屈曲型骨折 (中醫傷科學五版橈骨下端骨折P.109)", "E": "橈骨下端伸直型骨折  手掌著地"}, "answer": null, "notes": [], "id": 495}, {"year": 2008, "paper": "Paper 2", "question_number": 66, "question_text": "患者,女,30 嵗。帶下量多,色白,質黏,無臭味。短氣懶言,脘痞便溏。 舌淡苔白膩,脈濡緩。方用:", "options": {"A": "完帶湯 (中醫婦科學七版帶下病P.185)", "B": "止帶方", "C": "參苓白朮散", "D": "萆薢滲濕湯", "E": "香砂六君子湯"}, "answer": null, "notes": [], "id": 496}, {"year": 2008, "paper": "Paper 2", "question_number": 67, "question_text": "患兒,3 嵗。面色萎黃,身倦乏力,不思乳食,食則飽脹,嘔吐酸餿,大便 酸臭。治宜:", "options": {"A": "消食消乳,和中導滯  乳食內積-消乳丸, 木香大安丸", "B": "和胃理氣,消食導滯", "C": "補土抑木,消食導滯", "D": "健脾助運,消補兼施  積滯-脾虛夾積-健脾丸", "E": "健脾和胃,降逆止嘔"}, "answer": null, "notes": [], "id": 497}, {"year": 2008, "paper": "Paper 2", "question_number": 68, "question_text": "患者,女,18 嵗。月經約60 天一行,量少,色淡,小腹空痛,頭暈眼花, 失眠健忘。舌淡,苔少,脈細弱。診為", "options": {"A": "虛熱", "B": "腎陰虛", "C": "血虛  月經后期-血虛-補血調經-大補元煎", "D": "脾虛", "E": "氣虛"}, "answer": null, "notes": ["血寒-溫經散寒調經-溫經湯", "虛寒-扶陽祛寒調經-艾附暖宮丸", "氣滯-理氣調經-烏藥湯"], "id": 498}, {"year": 2008, "paper": "Paper 2", "question_number": 69, "question_text": "患兒,昨天起發熱,流涕,兼有咳嗽頭痛。夜晚突然抽搐,雙目上視,角弓 反張。診斷為:", "options": {"A": "感受外邪  急驚風-外感驚風-感受風邪-銀翹散", "B": "濕熱疫毒  清熱化濕,解毒熄風-黃連解毒湯", "C": "惊恐痙厥  鎮驚安神-抱龍丸", "D": "風寒外感", "E": "風熱閉肺"}, "answer": null, "notes": [], "id": 499}, {"year": 2008, "paper": "Paper 2", "question_number": 70, "question_text": "患者,24 嵗。惡寒發熱,咽喉腫痛,灼熱疼痛,吞咽不利,口渴咳嗽,大 便秘結,舌紅苔黃,脈數。當用下列何組穴位?(不肯定A 或B)", "options": {"A": "少商、合谷、尺澤、陷谷、關沖", "B": "曲池、合谷、大椎、外關", "C": "太溪、照海...."}, "answer": null, "notes": ["D.", "E."], "id": 500}, {"year": 2008, "paper": "Paper 2", "question_number": 71, "question_text": "男, 肛門疼痛4 天, 痛處迅速紅腫, 不能坐, 步行時痛甚, 無明顯全身症狀. 檢查見截石位6 點處紅腫,按之有波動感, 最有可能的診斷是", "options": {"A": "肛門旁皮下膿腫", "B": "坐骨直腸窩膿腫", "C": "骨盆直腸間隙膿腫", "D": "直腸後間隙膿腫", "E": "坐骨直腸窩膿腫穿破肛提肌"}, "answer": null, "notes": [], "id": 501}, {"year": 2008, "paper": "Paper 2", "question_number": 72, "question_text": "女, 45 歲, 心悸失眠, 神疲乏力, 納呆便溏, 氣短, 脈細弱, 治療最以下經穴", "options": {"A": "以手少陰、足太陰經穴及背俞穴為主", "B": "以手、足太陰經穴為主", "C": "以手少陰、手厥陰經穴為主", "D": "以手厥陰、足陽明經穴為主", "E": "以足太陰、手厥陰經穴為主"}, "answer": null, "notes": [], "id": 502}, {"year": 2008, "paper": "Paper 2", "question_number": 73, "question_text": "男, 25 歲, 牙痛, 惡寒發熱, 牙龈紅腫, 口臭口渴, 大便秘結, 舌紅苔黃厚, 脈浮數, 治療取以下穴位", "options": {"A": "合谷,下關, 頰車, 內庭, 風池"}, "answer": null, "notes": ["B.", "C.", "D.", "E."], "id": 503}, {"year": 2008, "paper": "Paper 2", "question_number": 74, "question_text": "小便時突然中斷,澀痛,伴腰骶絞痛劇烈,診斷為", "options": {"A": "熱淋", "B": "石淋", "C": "膏淋", "D": "血淋", "E": "勞淋"}, "answer": null, "notes": [], "id": 504}, {"year": 2008, "paper": "Paper 2", "question_number": 75, "question_text": "患者雙膝疼痛, 重着, 陰兩天加重, 治療首選哪穴", "options": {"A": "腎俞, 陰陵泉", "B": "膈俞,血海", "C": "足三里, 商丘", "D": "足三里, 行間", "E": "足三里, XX"}, "answer": null, "notes": [], "id": 505}, {"year": 2008, "paper": "Paper 2", "question_number": 76, "question_text": "女子小產後見帶下量多,色黃粘膩,有臭氣,胸悶口膩,納差,小便黃少, 舌苔黃膩,脈滑數。", "options": {"A": "完帶湯 B 內補丸 C 止帶方 D 萆薢滲濕湯 E 龍膽瀉肝湯"}, "answer": null, "notes": [], "id": 506}, {"year": 2008, "paper": "Paper 2", "question_number": 77, "question_text": "男子飽食後不適,嘔吐酸腐,脘腹脹滿,大便穢臭,苔膩,脈滑。 治療首選:", "options": {"A": "藿香正氣散 B 柴胡疏肝散 C 半夏厚樸湯 D 小半夏湯 E 保和丸"}, "answer": null, "notes": [], "id": 507}, {"year": 2008, "paper": "Paper 2", "question_number": 78, "question_text": "男子 5 年來頭皮上反復長數個紅斑,表面覆有白色鱗屑,把頭髮簇集成束, 但不脫髮,抓破鱗屑後有少量血水滲出,每年夏天症狀減輕。 診斷為:A 白禿瘡 B 圓癬 C 白疕 D 牛皮癬 E 肥瘡", "options": {}, "answer": null, "notes": [], "id": 508}, {"year": 2008, "paper": "Paper 2", "question_number": 79, "question_text": "患者身熱,微惡風,汗出不暢,頭脹痛,鼻塞,咽幹,苔薄黃,脈浮數,治 宜:", "options": {"A": "宣肺泄熱 B 清熱祛濕 C 溫肺散寒 D 滋陰清熱 E 辛涼解表"}, "answer": null, "notes": [], "id": 509}, {"year": 2008, "paper": "Paper 2", "question_number": 80, "question_text": "患者近幾月每于黎明前腹痛泄瀉 , 瀉後則安 , 形寒肢冷 , 腰酸軟 , 舌淡苔白, 脈沉細。治療首選:A 四神丸 B 參苓白朮散 C 附子理中丸 D 胃苓湯…", "options": {}, "answer": null, "notes": [], "id": 510}, {"year": 2008, "paper": "Paper 2", "question_number": 81, "question_text": "患者小便淡紅色, 鏡下血尿(+), 尿頻尿痛, 伴心煩急躁易怒, 治宜", "options": {"A": "八正散", "B": "小薊飲子", "C": "導赤散"}, "answer": null, "notes": ["D.", "E."], "id": 511}, {"year": 2008, "paper": "Paper 2", "question_number": 82, "question_text": "患者5 歲, 兩天前始見高熱, 自覺左側大腿疼痛, 不能走路. 查體見左側大腿 外側皮膚色紅, 微熱伴腫, 縱軸叩擊痛, 診斷為", "options": {"A": "附骨疽", "B": "丹毒"}, "answer": null, "notes": ["C.", "D.", "E."], "id": 512}, {"year": 2008, "paper": "Paper 2", "question_number": 83, "question_text": "患者皮膚紅腫高突, 焮熱疼痛, ......, 大膿頭, ......, 治宜", "options": {"A": "仙方活命飲", "B": "普濟消毒飲"}, "answer": null, "notes": ["C.", "D.", "E."], "id": 513}, {"year": 2008, "paper": "Paper 2", "question_number": 84, "question_text": "突發項背強直,問病因: 風邪", "options": {}, "answer": null, "notes": [], "id": 514}, {"year": 2008, "paper": "Paper 2", "question_number": 85, "que , "D": "酒醺鼻", "E": "面遊風"}, "answer": null, "notes": [], "id": 787}, {"year": 2009, "paper": "Paper 2", "question_number": 66, "question_text": "患者,女,6 歲,指縫、少腹間有紅色小丘疹,丘疱疹,有墜道,夜間劇痒, 自覺身痒,抓破后糜爛浸淫,伴舌紅,苔黃膩,脈滑數。用以下何方?", "options": {"A": "除濕胃苓湯", "B": "清瘟敗毒飲", "C": "清暑湯", "D": "化斑解毒湯", "E": "黃連解毒湯"}, "answer": null, "notes": [], "id": 788}, {"year": 2009, "paper": "Paper 2", "question_number": 67, "question_text": "一病人,皮膚起白色風團,瘙痒甚,遇冷遇風加劇,得熱緩解,舌淡苔薄白, 脈浮,方用:", "options": {"A": "桂枝湯 ─ 風寒證﹝五、六版﹞", "B": "消風散 ─ 風熱證﹝五、六版﹞", "C": "當歸飲子 ─ 血虛風燥﹝六版﹞", "D": "防風通聖散 合茵陳蒿湯 ─ 胃腸實熱證﹝五版﹞", "E": "八珍湯 ─ 氣血兩虛證﹝五版﹞"}, "answer": null, "notes": ["􀂙 資料摘錄自五版外科 P.144 及六版外科 P.145"], "id": 789}, {"year": 2009, "paper": "Paper 2", "question_number": 68, "question_text": "患者關節腫大疼痛, 呈游走性, 除局部取穴, 還可選取:", "options": {"A": "腎俞. 關元", "B": "膈俞. 血海", "C": "足三里. 商丘", "D": "大椎. 曲池", "E": "合谷. 外關"}, "answer": null, "notes": [], "id": 790}, {"year": 2009, "paper": "Paper 2", "question_number": 69, "question_text": "一少童跌倒左肘著地後,肘部呈靴形,檢查後肘三角正常,應診斷為:", "options": {"A": "肱骨髁上骨折", "B": "肘關節後脫位", "C": "肱骨干骨折"}, "answer": null, "notes": ["D.", "E."], "id": 791}, {"year": 2009, "paper": "Paper 2", "question_number": 70, "question_text": "患者,女,婚後6 年未孕,情志抑鬱,胸脅脹滿,舌質正常,脈弦,應辨證 為:", "options": {"A": "腎陰虛", "B": "腎陽虛", "C": "肝鬱", "D": "痰熱"}, "answer": null, "notes": ["E."], "id": 792}, {"year": 2009, "paper": "Paper 2", "question_number": 71, "question_text": "皮損潮紅灼熱,瘙癢無休,滲液,身熱,心煩,口渴,大便乾,尿短赤,脈 滑數(大概): A.", "options": {"B": "龍膽瀉肝湯合萆薢滲濕湯"}, "answer": null, "notes": ["C.", "D.", "E."], "id": 793}, {"year": 2009, "paper": "Paper 2", "question_number": 72, "question_text": "患者食完海鮮後出紅色風團,灼熱瘙癢, 遇熱加重, ,然後驟然消退, 發熱, 惡寒, 咽喉腫痛, 舌紅苔薄, 脈浮數…", "options": {"A": "當歸飲子", "B": "消風散", "C": "麻黃桂枝各半湯", "D": "防風通聖散"}, "answer": null, "notes": ["E."], "id": 794}, {"year": 2009, "paper": "Paper 2", "question_number": 73, "question_text": "濕熱濕瘡, 治法…清熱利濕", "options": {}, "answer": null, "notes": [], "id": 795}, {"year": 2009, "paper": "Paper 2", "question_number": 74, "question_text": "忘記題目.. 答案: 清熱解毒", "options": {}, "answer": null, "notes": [], "id": 796}, {"year": 2009, "paper": "Paper 2", "question_number": 75, "question_text": "患者 35 歲, 女, 結婚不孕 6 年, 善太息. 辨証…肝郁*", "options": {}, "answer": null, "notes": [], "id": 797}, {"year": 2009, "paper": "Paper 2", "question_number": 76, "question_text": "男,1 歲,極度消瘦,毛髮乾枯,腹凹如舟,大便稀溏,治法宜:", "options": {"A": "健脾益氣", "B": "消積理脾", "C": "疏肝理脾", "D": "補益氣血 干疳-八珍湯", "E": "滋陰補氣"}, "answer": null, "notes": [], "id": 798}, {"year": 2009, "paper": "Paper 2", "question_number": 77, "question_text": "女,33 歲,產後 10 天,高熱,惡露量少,色紫,有臭氣,舌紅苔黃,脈數 有力,方宜用:", "options": {"A": "解毒活血湯  產後發熱-感染邪毒-清熱解毒,涼血化瘀", "B": "銀翹散", "C": "生化湯 血瘀-活血化瘀", "D": "荆防四物湯 外感-養血祛風", "E": "八珍湯 血虛-補益氣血"}, "answer": null, "notes": [], "id": 799}, {"year": 2009, "paper": "Paper 2", "question_number": 78, "question_text": "女,30 歲,半年前人工流產,經來小腹疼痛,灼熱感,低熱起伏,經色暗 紅,舌紅苔黃,脈濡數,是屬於那個證型?", "options": {"A": "氣血虛弱  益氣補血止痛-聖愈湯", "B": "濕熱下注  痛經-清熱除濕,化瘀止痛-清熱調血湯", "C": "肝賢虛損  益腎養肝止痛-調肝湯", "D": "寒濕凝滯  溫經散寒除濕,化瘀止痛-少腹逐瘀湯", "E": "陽虛內寒  溫經暖宮止痛-溫經湯"}, "answer": null, "notes": ["氣滯血瘀-理氣化瘀止痛-膈下逐瘀湯"], "id": 800}, {"year": 2009, "paper": "Paper 2", "question_number": 79, "question_text": "女,孕3 月,小便頻數,尿黃赤,灼熱刺痛,舌紅苔黃膩,脈滑數,屬於那 個證型?", "options": {"A": "氣血虛弱", "B": "心火偏亢", "C": "陰虛", "D": "濕熱下注", "E": "血瘀"}, "answer": null, "notes": [], "id": 801}, {"year": 2009, "paper": "Paper 2", "question_number": 80, "question_text": "男,2 歲,脘腹脹滿,痛則瀉,瀉後痛減,大便酸臭,屬於哪種泄瀉?", "options": {"A": "傷食", "B": "風寒", "C": "濕熱", "D": "脾腎陽虛", "E": "傷陰"}, "answer": null, "notes": [], "id": 802}, {"year": 2009, "paper": "Paper 2", "question_number": 81, "question_text": "男,8 歲,髮際長出瘡大如梅李,…應用何方?", "options": {"A": "普濟消毒飲", "B": "五味消毒飲", "C": "清暑湯"}, "answer": null, "notes": ["D.", "E."], "id": 803}, {"year": 2009, "paper": "Paper 2", "question_number": 82, "question_text": "患者,男,咳嗽咽癢一天,鼻流清涕,畏寒發熱,夜間突發喉間哮鳴,咳而 引吐,痰黃黏稠,口渴便秘,舌紅苔黃膩,脈滑數,治療宜:", "options": {"A": "大青龍湯", "B": "小青龍湯", "C": "射乾麻黃湯  寒哮-溫肺散寒,化痰平喘", "D": "定喘湯  熱哮-清熱宣肺,化痰定喘", "E": "麻杏石甘湯"}, "answer": null, "notes": [], "id": 804}, {"year": 2009, "paper": "Paper 2", "question_number": 83, "question_text": "患者發熱,頭痛,流涕,咳嗽,高熱突發痙厥昏迷,脈浮數,應選下列何方?", "options": {"A": "羚角鉤藤湯", "B": "銀翹散加鉤藤,蟬衣,僵蠶  急驚風-感受風邪", "C": "清瘟敗毒飲  急驚風-感受暑邪", "D": "黃連解毒湯  急驚風-感受疫邪-濕熱疫毒", "E": "琥珀抱龍丸  驚恐厥-鎮驚安神"}, "answer": null, "notes": [], "id": 805}, {"year": 2009, "paper": "Paper 2", "question_number": 84, "question_text": "患者發熱,煩躁口渴,咽喉腫痛,伴有麋爛白腐,皮疹密佈,色紅如丹,壓 之褪色,後起紅刺,其治法是:丹痧", "options": {"A": "辛涼透表,清熱利咽  邪侵肺衛-解肌透痧湯", "B": "清氣涼營,瀉火解毒  毒在氣營-涼營清氣湯", "C": "養陰生津,清熱潤喉  疹後陰傷-沙參麥冬湯", "D": "清熱解毒,佐以透表", "E": "清熱解毒,利咽消腫"}, "answer": null, "notes": [], "id": 806}, {"year": 2009, "paper": "Paper 2", "question_number": 85, "question_text": "患者脅肋脹痛,口苦,煩躁易怒,舌苔薄黃,脈弦,治療應選何穴?", "options": {"A": "足三里", "B": "陽陵泉  足少陽膽經-胸脅疼痛", "C": "委中", "D": "豐隆", "E": "上巨虛"}, "answer": null, "notes": [], "id": 807}, {"year": 2009, "paper": "Paper 2", "question_number": 86, "question_text": "男,9歲,消瘦,發現右頸中部舋核结节三枚,扪之无發热,近日结节長大 并互相连结,与皮肤粘连,推之不移。現時胃口欠佳,潮热盗汗,舌红少苔,脉 细数。問所患何病?", "options": {"A": "頸痈  B.瘰癧  C.失荣  D.舋核  E.發頤"}, "answer": null, "notes": [], "id": 808}, {"year": 2009, "paper": "Paper 2", "question_number": 87, "question_text": "女,50 歲,一年前右乳發現肿物,不痛,质坚硬,活動度差。近日肿物皮肤 下陷成 “酒窩” ,問肿物为何?", "options": {"A": "乳痈  B.乳痨  C.乳癖  D.乳癧  E.乳岩"}, "answer": null, "notes": [], "id": 809}, {"year": 2009, "paper": "Paper 2", "question_number": 88, "question_text": "女,30 歲,停經2 月,已檢查為懷孕。近5 天少腹墜脹,酸痛,陰道少量出 血,色鮮紅,頭暈耳鳴,小便頻數,去年曾自然流產一胎。舌淡苔薄白,脈沉細 滑,最可能診斷為:", "options": {"A": "滑胎  B.胎漏  C.胎动不安  D.胎死不下  E.堕胎"}, "answer": null, "notes": [], "id": 810}, {"year": 2009, "paper": "Paper 2", "question_number": 89, "question_text": "患者,女,19 歲,月經每月提前九至十天,量多,色淡,神疲肢軟,小腹 空墜,納少便溏,舌淡苔白,脈緩細。首選方為:", "options": {"A": "举元煎  B.补中益气汤  C.归脾汤  D.人参养营汤  E.??(忘記了)"}, "answer": null, "notes": [], "id": 811}, {"year": 2009, "paper": "Paper 2", "question_number": 90, "question_text": "女,18 歲,14 歲月經初潮,近三年來經腹痛,拒按,得热痛減,經色紫暗, 經血成塊,問應用以下何方药为宜?", "options": {"A": "温經湯  B.調肝汤  C.血府逐瘀汤  D.少腹逐瘀汤  E.隔下逐瘀汤"}, "answer": null, "notes": [], "id": 812}, {"year": 2009, "paper": "Paper 2", "question_number": 91, "question_text": "患者,男,29 歲,因外傷致左髖疼痛 12 小時,體查:左髖外旋、外展,略 屈髖畸形,患肢略長於健側,其診斷為:", "options": {"A": "左股骨頸骨折", "B": "左髖臼骨折", "C": "左髖關節前脫位", "D": "左髖關節後脫位 屈曲,內收內旋畸形,較健側短,黏膝陽性", "E": "左股骨轉子間骨折"}, "answer": null, "notes": ["􀂙 參考五版傷科 P.177 之前脫位的體徵􀂙"], "id": 813}, {"year": 2009, "paper": "Paper 2", "question_number": 92, "question_text": "患者,男,26 歲,咳嗽,痰稀色白,伴見輕度發熱,無汗,苔白,脈浮緊。 宜治療", "options": {"A": "尺澤、肺俞、大椎、合谷", "B": "肺俞、列缺、合谷", "C": "肺俞、尺澤、太沖、豐隆", "D": "肺俞、太淵、太溪、豐隆", "E": "肺俞、膏盲俞、定喘、太淵"}, "answer": null, "notes": ["􀂙 參考五版針灸 P.231 外感咳嗽􀂙"], "id": 814}, {"year": 2009, "paper": "Paper 2", "question_number": 93, "question_text": "患者,男95 歲,臨床診斷為精濁,少腹、睪丸作脹痛,尿末時有白色分泌 液,苔暗有瘀斑,脈沉澀,其証候為:", "options": {"A": "濕熱壅滯  清利濕熱-大分清飲,八正散,龍膽瀉肝湯", "B": "腎陽不足  溫腎固精-金鎖固精丸合右歸丸", "C": "陰虛火旺  補腎滋陰清相火-知柏地黃湯合蓽薢分清飲", "D": "氣血瘀滯  活血散瘀-前列腺湯", "E": "肝腎不足"}, "answer": null, "notes": [], "id": 815}, {"year": 2009, "paper": "Paper 2", "question_number": 94, "question_text": "患者,男,唇邊有針豆樣大小疱疹,灼熱,刺痛,破後潰瘍,宜選方:", "options": {"A": "白玉膏", "B": "青黛膏", "C": "金黃膏", "D": "紅油膏", "E": "青吹口油膏"}, "answer": null, "notes": [], "id": 816}, {"year": 2009, "paper": "Paper 2", "question_number": 95, "question_text": "患者,男,頸項腫物,有多個膿頭,向四周擴散,潰瘍,舌紅苔黃膩,脈滑 數。首選方:", "options": {"A": "黃連解毒湯", "B": "五味消毒飲", "C": "竹葉黃蓍湯", "D": "托里消毒散", "E": "仙方活命飲"}, "answer": null, "notes": [], "id": 817}, {"year": 2009, "paper": "Paper 2", "question_number": 96, "question_text": "肉癭的特點: 頸前喉結,或兩側結塊,如肉之團,能隨吞咽動作而上下", "options": {}, "answer": null, "notes": [], "id": 818}, {"year": 2009, "paper": "Paper 2", "question_number": 97, "question_text": "月經來前腹痛,少腹空墜,胸脅痛,乳房脹痛,針刺", "options": {"A": "地機,商丘 b. 太沖,肝俞,中極"}, "answer": null, "notes": [], "id": 819}, {"year": 2009, "paper": "Paper 2", "question_number": 98, "question_text": "男,20 歲,關節疼痛劇烈,痛不可近,兼咽痛, 發熱,舌紅,除局部取穴外, 還取甚麼穴位: a. 大椎, 曲池 *  b. 脾俞 +..... c.腎俞 +.....", "options": {}, "answer": null, "notes": [], "id": 820}, {"year": 2009, "paper": "Paper 2", "question_number": 99, "question_text": "妊娠的治療原則 治病與安胎並舉", "options": {}, "answer": null, "notes": [], "id": 821}, {"year": 2009, "paper": "Paper 2", "question_number": 100, "question_text": "麻疹的預防與調攝下列那項是錯誤的", "options": {"A": "忌食辛辣刺激食物", "B": "一旦與麻疹患兒接觸, 應立即隔離", "C": "麻疹流行期, 未患過麻疹的小兒盡量不去公共場所", "D": "保持室內空氣流通", "E": "患病期間禁止洗面洗眼 *"}, "answer": null, "notes": [], "id": 822}, {"year": 2009, "paper": "Paper 2", "question_number": 101, "question_text": "患者,男 44 歲. 腹脹, 小便少, 口渴, 心煩, 舌紅苔黃, 脈弦滑, 問治法 清熱利濕, 攻下遂水 溫補脾腎…. 活血化瘀…", "options": {}, "answer": null, "notes": [], "id": 823}, {"year": 2009, "paper": "Paper 2", "question_number": 102, "question_text": "患者,惡寒發熱,流涕鼻塞,即晚咳嗽咯痰,痰鳴氣喘,痰黃稠,苔黃膩, 脈滑數。選葯方:", "options": {"A": "小青龍湯", "B": "大青龍湯", "C": "射干麻黃湯", "D": "三子養親湯", "E": "二陳湯"}, "answer": null, "notes": [], "id": 824}, {"year": 2009, "paper": "Paper 2", "question_number": 103, "question_text": "患者,胸悶胸痛,胸痛徹背,喘促氣短,肢體沉重,痰多色白,形體肥胖, 苔膩脈沉滑。 問治法:", "options": {"A": "辛溫通陽,開痺散寒  陰寒凝滯-瓜蔞薤白白酒湯", "B": "通陽泄濁,豁痰開結  痰濁壅塞-瓜蔞薤白半夏湯", "C": "清熱化痰,理氣止痛", "D": "理氣活血,通絡止痛", "E": "補益心脾,通陽止痛"}, "answer": null, "notes": [], "id": 825}, {"year": 2009, "paper": "Paper 2", "question_number": 104, "question_text": "患者,咳嗽喘促,喉中痰鳴,呼氣延長,痰白清稀,手足冷,舌淡,苔白 膩,脈弦緊。診斷:", "options": {"A": "風寒閉肺", "B": "風熱閉肺", "C": "痰熱蘊肺", "D": "寒性哮喘", "E": "熱性哮喘"}, "answer": null, "notes": [], "id": 826}, {"year": 2009, "paper": "Paper 2", "question_number": 105, "question_text": "患者突然昏倒,不知人事,四肢抽搐,口吐涎沬,喉中痰鳴,平素性情急 躁易怒,便秘,失眠,舌紅,苔黃膩,脈弦滑。問治法:", "options": {"A": "清心瀉火,開窍定癇", "B": "補益心腎,健脾化痰  癇證-心腎虧虛-大補元煎,六君子湯", "C": "清肝瀉火,化痰開窍  癇證-痰火內盛-龍膽瀉肝湯合滌痰湯", "D": "補益心脾,益氣養血", "E": "平肝熄風,健脾補腎"}, "answer": null, "notes": ["風痰閉阻-滌痰熄風,開竅定癇-定癇丸"], "id": 827}, {"year": 2009, "paper": "Paper 2", "question_number": 106, "question_text": "胸悶不舒 (唔記得問乜)", "options": {}, "answer": null, "notes": [], "id": 828}, {"year": 2009, "paper": "Paper 2", "question_n  {"year": 2010, "paper": "Paper 2", "question_number": 60, "question_text": "患者,女,45歲。素患足癬。昨日起發熱、頭痛。昨日起左下肢皮膚出現大片 紅斑,高出皮膚,邊界清晰,按之退色,放手又復,舌紅苔薄黃,脈滑數。", "options": {"A": "藥疹", "B": "丹毒", "C": "小腿癰", "D": "發", "E": "XXXXX"}, "answer": null, "notes": [], "id": 1064}, {"year": 2010, "paper": "Paper 2", "question_number": 61, "question_text": "患者頭痛發熱兩天,鼻塞流涕,無汗,咽癢,咯稀痰,舌苔薄白,脈浮緊,除 用列缺、風門外,還應選配", "options": {"A": "風池、合谷", "B": "曲池、外關", "C": "尺澤、中渚", "D": "大椎、陽溪", "E": "曲池、內關"}, "answer": null, "notes": [], "id": 1065}, {"year": 2010, "paper": "Paper 2", "question_number": 62, "question_text": "患者,女,48歲,風團反覆發作5年,近因勞累後發作加劇,神疲倦怠,舌淡苔 薄脈細濡,宜選方", "options": {"A": "二仙湯加減", "B": "四物湯加減", "C": "八珍湯加減", "D": "防風通聖散加減", "E": "補中益氣湯加減"}, "answer": null, "notes": [], "id": 1066}, {"year": 2010, "paper": "Paper 2", "question_number": 63, "question_text": "患者咳吐膿血痰,量多質粘稠,腥臭異常,舌紅苔黃膩,脈滑數,屬於肺癰的 哪一個階段 ?", "options": {"A": "初期", "B": "成癰期", "C": "潰膿期", "D": "恢復期", "E": "以上皆非"}, "answer": null, "notes": [], "id": 1067}, {"year": 2010, "paper": "Paper 2", "question_number": 64, "question_text": "患者28歲,產後一天,排尿困難,小便量少而不爽利,小腹墜脹,狀如覆碗, 食欲不振,氣短,舌淡苔白,脈細弱,應診斷為", "options": {"A": "淋證", "B": "癃閉", "C": "水腫", "D": "鼓脹", "E": "以上皆非  產後排尿異常-氣虛"}, "answer": null, "notes": [], "id": 1068}, {"year": 2010, "paper": "Paper 2", "question_number": 65, "question_text": "患者每於經淨後1-2 天,小腹隱痛喜按,神疲乏力,頭暈心悸,舌淡苔白,脈細 弱,證型為", "options": {"A": "肝腎虧損", "B": "氣血虛弱", "C": "寒濕凝滯", "D": "氣血瘀滯", "E": "濕熱不注"}, "answer": null, "notes": [], "id": 1069}, {"year": 2010, "paper": "Paper 2", "question_number": 66, "question_text": "患者, 女 45, 發現少腹包塊3個月, …..月經後期, 量少, 色黯紅, 舌紫暗, 有瘀點, 脈澀, 應選用:", "options": {"A": "膈下逐瘀湯", "B": "少腹逐瘀湯", "C": "桂枝茯苓丸  癥瘕-血瘀-活血散結,破瘀消癥", "D": "桃紅四物湯", "E": "血腑逐瘀湯"}, "answer": null, "notes": [], "id": 1070}, {"year": 2010, "paper": "Paper 2", "question_number": 67, "question_text": "患者, 男 35, 足部怕冷疼痛, 間歇性跛行1年餘, 近1月來疼痛加重, 呈持續性疼 痛, 夜間尤甚, 趺陽脈消失, 應診斷為:", "options": {"A": "雷諾氏病?", "B": "糖尿病性壞疽", "C": "痛痹", "D": "脫疽", "E": "脈痹"}, "answer": null, "notes": [], "id": 1071}, {"year": 2010, "paper": "Paper 2", "question_number": 68, "question_text": "患者, 男 75, 兩目視物昏曚, 乾澀不適, 晶珠混濁, 腰膝痠軟, 口乾, 舌紅 苔少, 脈細… ,其證候是:", "options": {"A": "氣血虧虛", "B": "肝腎陰虛", "C": "陰虛夾濕", "D": "XXXXX", "E": "XXXXX"}, "answer": null, "notes": [], "id": 1072}, {"year": 2010, "paper": "Paper 2", "question_number": 69, "question_text": "低熱勞累後加重,倦怠乏力,面白無華,短氣……辨證為", "options": {"A": "陰虛發熱 滋陰清熱-清骨散", "B": "陽虛發熱", "C": "氣虛發熱 益氣健脾,甘溫除熱-補中益氣湯", "D": "血虛發熱 益氣養血-歸脾湯", "E": "痰熱發熱"}, "answer": null, "notes": ["瘀血發熱-活血化瘀-血府逐瘀湯", "肝鬱發熱-疏感解鬱,清肝瀉熱-丹梔逍遙散"], "id": 1073}, {"year": 2010, "paper": "Paper 2", "question_number": 70, "question_text": "頭痛如裹,肢重困倦,惡風,苔薄,脈浮……辨證為", "options": {"A": "風寒頭痛 疏散風寒-川芎茶調散 / 厥陰頭痛-溫散厥陰寒邪-吳茱萸湯", "B": "痰飲頭痛", "C": "風濕頭痛 祛風勝濕-羌活勝濕湯", "D": "痰濁頭痛 化痰降逆-半夏白朮天麻湯", "E": "瘀血頭痛 活血化瘀-通竅活血湯"}, "answer": null, "notes": ["風熱頭痛-疏風清熱-芎芷石膏湯", "肝陽頭痛-平肝潛陽-天麻鉤藤飲", "腎虛頭痛-養陰補腎-大補元煎", "血虛頭痛-養血-加味四物湯", "雷頭風-除濕化痰-清震湯", "偏頭風-平肝熄風清熱"], "id": 1074}, {"year": 2010, "paper": "Paper 2", "question_number": 71, "question_text": "小兒1歲, 見泄瀉半月, 食入即吐, 面色萎黃, 方用", "options": {"A": "參芩白术散 脾虛瀉-健脾益氣", "B": "理中湯", "C": "附子理中湯 脾腎陽虛-補脾溫腎", "D": "保和丸 傷食瀉-消食化積", "E": "藿香正氣散 風寒瀉-疏風散寒"}, "answer": null, "notes": ["濕熱瀉-清熱利濕-葛根芩連湯", "傷陰-酸甘斂陰-連梅湯", "傷陽-溫陽救逆-參附龍牡湯"], "id": 1075}, {"year": 2010, "paper": "Paper 2", "question_number": 72, "question_text": "患者損傷, 見左踝疼痛腫脹, 功能障礙, 自攜X線片提示: 左內踝斜形骨, 左外踝撕脫性棋斷骨折, 其損傷暴力為", "options": {"A": "外旋", "B": "外翻", "C": "內翻", "D": "縱形擠壓", "E": "橫向擠壓"}, "answer": null, "notes": [], "id": 1076}, {"year": 2010, "paper": "Paper 2", "question_number": 73, "question_text": "患者失眠, 多夢少寐, 頭暈目眩, 腰痠遺精, 舌紅, 脈細數, 穴選", "options": {"A": "脾俞 足三里 內關", "B": "肝俞 陽陵泉 內關", "C": "肝俞 行間 心俞", "D": "腎俞 太溪 心俞", "E": "XXXXX"}, "answer": null, "notes": [], "id": 1077}, {"year": 2010, "paper": "Paper 2", "question_number": 74, "question_text": "患者身熱, 微惡風寒, 少汗, 頭昏, , 心煩, 口干, 干咳少痰, 舌紅少苔, 脈細數, 治宜", "options": {"A": "荊防敗毒散 風寒感冒-辛溫解表", "B": "玉屏風散", "C": "銀翹散 風熱感冒-辛涼解表", "D": "加減葳蕤湯 陰虛感冒-滋陰解表", "E": "桑杏湯 風燥咳嗽-疏風清肺,潤燥止咳"}, "answer": null, "notes": [], "id": 1078}, {"year": 2010, "paper": "Paper 2", "question_number": 75, "question_text": "患者右脅部出現成族水疱, 1周前皮損己退, 現仍皮膚覺痛, 舌紅, 脈弦, 方用", "options": {"A": "龍膽瀉肝湯  初起-清肝瀉火", "B": "知柏地黃丸", "C": "萆薢滲濕湯", "D": "茵陳蒿湯", "E": "逍遙散 疏肝理氣,活血重鎮止痛"}, "answer": null, "notes": ["## 若皮疹消退後,皮膚仍刺痛者,宜疏肝理氣,活血重鎮止痛,用逍遙散加 xx(幾隻藥)", "@ 五版外科 p123"], "id": 1079}, {"year": 2010, "paper": "Paper 2", "question_number": 76, "question_text": "患者,男,35 歲,項後皮膚增厚,密集粟米樣扁平丘疹,劇烈瘙癢,多在夏 天加重,應診斷為:", "options": {"A": "濕疹", "B": "牛皮癬", "C": "白疕", "D": "風瘙癢", "E": "圓癬"}, "answer": null, "notes": [], "id": 1080}, {"year": 2010, "paper": "Paper 2", "question_number": 77, "question_text": "患者喉中痰鳴如吼,氣粗息湧,胸高脇脹,咳痰色黃,煩悶不安,汗出面赤, 口渴喜飲,舌質紅苔黃膩,脈滑數。治法為:", "options": {"A": "清熱瀉肺,豁痰開竅", "B": "宣肺化痰,止咳平喘", "C": "清熱宣肺,化痰定喘(熱哮)", "D": "宣肺解表,止咳化痰", "E": "瀉肺通腑,宣肺清熱"}, "answer": null, "notes": ["p61"], "id": 1081}, {"year": 2010, "paper": "Paper 2", "question_number": 78, "question_text": "患兒,2 歲,發熱咳嗽,氣急鼻煽,口唇紫紺,泛吐痰涎,舌紅苔黃膩。證 候是:P34", "options": {"A": "風熱閉肺  辛涼輕劑宣肺化痰-銀翹散 / 辛涼重劑化痰定喘-麻杏石甘湯", "C": "痰熱咳嗽", "D": "風熱咳嗽", "E": "心陽虛衰 溫補心陽,救逆固脫-參附龍牡救逆湯"}, "answer": null, "notes": ["B, 痰熱閉肺  清熱宣肺,滌痰定喘-五虎湯合葶苈大棗瀉肺湯", "風寒閉肺-辛溫開肺-三拗湯合蔥豉湯,華蓋散", "陰虛肺熱-養陰清肺-沙參麥冬湯", "肺脾氣虛-益氣健脾-人參五味子湯", "內陷厥陰-平肝熄風,清心開竅-羚角鉤藤湯,牛黃清心丸"], "id": 1082}, {"year": 2010, "paper": "Paper 2", "question_number": 79, "question_text": "患者,男,63 歲,胃痛多年,痛處固定,拒按,食後加重,偶有便血,舌質 紫黯有瘀點,脈細澀。治療除用中脘、內關、足三里外,可選以下哪些穴位?", "options": {"A": "太沖、陽陵泉", "B": "天樞、梁門(飲食停滯)", "C": "胃俞、脾俞、足三里", "D": "脾俞、膈俞", "E": "上脘、梁門、合谷"}, "answer": null, "notes": [], "id": 1083}, {"year": 2010, "paper": "Paper 2", "question_number": 80, "question_text": "哮證患者平素食少,脘悶,大便不實,多於飲食不節後發作,神疲倦怠,短 氣不足以息,語聲低微,舌質淡,苔白滑,脈細。治療宜首選:", "options": {"A": "六君子湯 (脾虛氣弱)-健脾化痰", "B": "參苓白朮散", "C": "二陳湯", "D": "生脈散", "E": "平喘固本湯"}, "answer": null, "notes": ["熱哮-清肺化痰定喘-麻杏石甘湯,蘇葶丸", "寒哮-溫肺化痰定喘-小青龍湯和三子養親湯", "肺氣虛-補肺固衛-玉屏風散", "腎虛不納-補腎固本-金匱腎氣丸"], "id": 1084}, {"year": 2010, "paper": "Paper 2", "question_number": 81, "question_text": "痢下赤白膿血,臍腹灼痛,虛坐努責,食少,心煩口乾,舌紅絳,苔少,脈細 數,治療宜選用", "options": {"A": "桃花湯 ( 虛寒痢-溫補脾腎,收澀固脫-桃花湯-收澀強 )", "B": "真人養臟湯 ( 虛寒痢-真人養臟湯-收澀兼補脾)", "C": "駐車丸 ( 陰虛痢-養陰清腸 )", "D": "連理湯 ( 休息痢-溫中清腸,佐以調氣化滯 )", "E": "以上皆非"}, "answer": null, "notes": ["濕熱痢-清熱解毒調氣行血-芍藥湯", "疫毒痢-清熱涼血解毒-白頭翁湯", "寒濕痢-溫化寒濕-胃苓湯"], "id": 1085}, {"year": 2010, "paper": "Paper 2", "question_number": 82, "question_text": "患者泄瀉多在黎明之前﹝五更瀉─脾腎陽虛﹞,腹滿作痛,腸鳴即瀉,瀉後則 安,形寒肢冷,腰膝痠軟﹝腎陽虛﹞,舌淡苔白,脈沉細。治療應首選", "options": {"A": "理中丸 脾陽虛", "B": "異功散 脾氣虛", "C": "四神丸 腎陽虛衰泄瀉", "D": "駐車丸 陰虛痢", "E": "右歸丸 溫補腎陽"}, "answer": null, "notes": [], "id": 1086}, {"year": 2010, "paper": "Paper 2", "question_number": 83, "question_text": "患者,男,40 歲。咳逆上氣﹝咳嗽﹞,面赤咽乾,痰量少而黏,難於咯出﹝木 火刑金,煉液成痰﹞,口苦,兩脅脹痛﹝肝﹞,苔薄黃少津,脈弦數﹝熱證﹞。治 療應首選", "options": {"A": "桑菊飲合二陳湯", "B": "桑杏湯合二陳湯", "C": "清金化痰湯合黛蛤散", "D": "加減瀉白散合黛蛤散 肝火犯肺型咳嗽-清肺平肝,順氣降火", "E": "二陳湯合三子養親湯 痰濕蘊肺-健脾燥濕,化痰止咳"}, "answer": null, "notes": [], "id": 1087}, {"year": 2010, "paper": "Paper 2", "question_number": 84, "question_text": "某男,咳嗽2天,壯熱,汗出煩躁,咳嗽氣急,胸痛作痛,轉側不利,咳吐濁痰 呈黃綠色,自覺喉間有腥味,口乾咽燥,苔黃膩,脈滑數。診斷為", "options": {"A": "肺癰初期", "B": "肺癰成癰期", "C": "肺癰潰膿期", "D": "咳嗽痰熱型", "E": "喘証痰熱型"}, "answer": null, "notes": [], "id": 1088}, {"year": 2010, "paper": "Paper 2", "question_number": 85, "question_text": "某男,身熱,微惡風,汗出不暢,頭痛,咳嗽,痰黏,鼻塞,口渴引飲,舌苔 薄白微黃,脈浮數,治宜", "options": {"A": "銀翹散 (風熱感冒)", "B": "麻杏石甘湯", "C": "加減葳蕤湯", "D": "XXXXX", "E": "XXXXX"}, "answer": null, "notes": [], "id": 1089}, {"year": 2010, "paper": "Paper 2", "question_number": 86, "question_text": "患者, 38歲, 肛門部疼痛, 反覆流膿, 檢查見外口位於截石位1點位置, 距離肛緣 8cm, 可擠出膿液, 診斷為肛瘻。其內口位於", "options": {"A": "截石位 1點", "B": "截石位 3點", "C": "截石位 6點", "D": "截石位 9點", "E": "截石位 12 點"}, "answer": null, "notes": [], "id": 1090}, {"year": 2010, "paper": "Paper 2", "question_number": 87, "question_text": "患者女, 24歲, 產后乳汁分泌少, 甚或全無, 胸脅脹悶, 情志抑鬱不樂, 或有微熱, 食欲減退。苔薄黃, 脈弦細p147", "options": {"A": "逍遙散", "B": "通乳丹  氣血虛弱-補氣養血,佐以通乳", "C": "下乳湧泉散 (肝鬱氣滯)-疏肝解鬱,通絡下乳", "D": "柴胡疏肝散", "E": "XXXXX"}, "answer": null, "notes": [], "id": 1091}, {"year": 2010, "paper": "Paper 2", "question_number": 88, "question_text": "女, 24 歲, 孕 45 天, 腰痠腹痛, 陰道少量出血, 色黯, 頭暈耳鳴, 舌淡苔白, 脈沉滑尺弱, 方用:", "options": {"A": "胎元飲(氣血虛)   B. 忘記   C. 保陰煎(血熱)   D. 固陰煎   E. 壽胎"}, "answer": null, "notes": ["丸(腎虛)"], "id": 1092}, {"year": 2010, "paper": "Paper 2", "question_number": 89, "question_text": "患者,年輕, 一天前不慎滑倒, 見膝部明顯腫脹, 瘀血甚. X-ray示 髕骨粉碎性骨 折, 無移位. 現予內服藥之治法為:", "options": {"A": "活血化瘀舒筋", "B": "活血化瘀消腫", "C": "活血化瘀接骨", "D": "活血化瘀養血", "E": "XXXXXX"}, "answer": null, "notes": [], "id": 1093}, {"year": 2010, "paper": "Paper 2", "question_number": 90, "question_text": "患者, 女, 帶下, 稀薄色白, 氣腥, 伴腰部痠痛, 頭暈神倦, 肢體疲乏, 食欲不振, 脈沉遲, 苔白滑. 取主穴外, 還選", "options": {"A": "行間, 陰陵泉", "B": "脾俞, 三陰交", "C": "關元, 足三里", "D": "合谷, 足三里", "E": "太沖, 足三里"}, "answer": null, "notes": [], "id": 1094}, {"year": 2010, "paper": "Paper 2", "question_number": 91, "question_text": "患者失血過多,項背強急,四肢抽搐,頭目昏眩,脈弦細,辨證為:", "options": {"A": "陽虛化寒", "B": "邪壅經絡", "C": "陰血虧虛", "D": "氣虛?", "E": "熱甚?"}, "answer": null, "notes": [], "id": 1095}, {"year": 2010, "paper": "Paper 2", "question_number": 92, "question_text": "氣鬱化火鬱證用甚麼方?", "options": {"A": "丹梔逍遙散合左金丸", "B": "柴胡疏肝湯", "C": "越鞠丸", "D": "半夏厚樸湯", "E": "溫膽湯"}, "answer": null, "notes": [], "id": 1096}, {"year": 2010, "paper": "Paper 2", "question_number": 93, "question_text": "陰虛腰痛用甚麼方(不肯定記得是否這條)", "options": {"A": "六味地黃丸", "B": "左歸丸", "C": "右歸丸", "D": "金匱腎氣丸", "E": "大補元煎"}, "answer": null, "notes": [], "id": 1097}, {"year": 2010, "paper": "Paper 2", "question_number": 94, "question_text": "暴飲過食之後,氣息窒塞,脘腹脹滿,脈滑實,服保和丸無效後,可用何方?", "options": {"A": "大柴胡湯", "B": "大承氣湯", "C": "小承氣湯", "D": "調胃承氣湯", "E": "涼膈散"}, "answer": null, "notes": [], "id": 1098}, {"year": 2010, "paper": "Paper 2", "question_number": 95, "question_text": "腹痛急暴,得溫痛減,遇冷更甚,口和不渴,小便清利,大便溏薄,舌苔白膩, 脈沉緊,辨證為?", "options": {"A": "虛寒證  溫中補虛和里緩急-小建中湯", "B": "濕熱證  泄熱通腑-大承氣湯", "C": "飲食積滯 消食導滯-保和丸, 重證-枳實導滯丸", "D": "寒實證  溫中散寒-良附丸合正氣天香散", "E": "氣滯血瘀  氣滯-疏肝理氣-柴胡疏肝散 / 血瘀-活血化瘀-少腹逐瘀湯"}, "answer": null, "notes": [], "id": 1099}, {"year": 2010, "paper": "Paper 2", "question_number": 96, "question_text": "腰痠痛反覆發作,伴腿軟,心煩失眠,口乾咽燥,面色潮紅,手足心熱,舌紅苔少,脈弦 細而數者,宜選用:", "options": {"A": "大補元煎", "B": "左歸丸", "C": "右歸丸", "D": "金匱腎氣丸", "E": "以上皆非"}, "answer": null, "notes": [], "id": 1100}, {"year": 2010, "paper": "Paper 2", "question_number": 97, "question_text": "患者,男,60歲。不寐,頭重,痰多胸悶,惡食噯氣,心煩口苦,苔膩而黃,脈滑 數。治法為: [失眠,辨證見痰證,熱證,胃不和,以A最為全面和合理]", "options": {"A": "化痰清熱,和中安神  溫膽湯", "B": "滋陰降火,養心安神", "C": "補益心脾,以生氣血", "D": "益氣鎮驚,安神定志", "E": "疏肝清熱,佐以安神"}, "answer": null, "notes": [], "id": 1101}, {"year": 2010, "paper": "Paper 2", "question_number": 98, "question_text": "女,30.平素身體虛弱,易於感冒,近日突然惡寒發熱,肢體困倦,無汗,咳嗽,痰白, 舌淡苔白,脈浮無力,方用?", "options": {"A": "玉屏風散", "B": "參蘇飲", "C": "麻黃湯", "D": "荊防敗毒散", "E": "以上皆非"}, "answer": null, "notes": [], "id": 1102}, {"year": 2010, "paper": "Paper 2", "question_number": 99, "question_text": "脅痛,悠悠不止,勞累後加重,頭暈目眩,心中煩熱,口干咽燥,舌紅苔少,脈細弦而 數,方用?", "options": {"A": "柴胡疏肝散", "B": "歸脾湯", "C": "一貫煎(肝陰不足)", "D": "復元活血湯", "E": "逍遙散"}, "answer": null, "notes": [], "id": 1103}, {"year": 2010, "paper": "Paper 2", "question_number": 100, "question_text": "患者,男,58 歲。胸痹多年,午前突發心前區絞痛,四肢不溫,面色蒼白,冷汗 淋灕,舌淡,脈弦。以特定穴來進行治療宜選用:", "options": {"A": "原穴,絡穴", "B": "俞穴,募穴", "C": "五輸穴", "D": "下合穴", "E": "八脈交會穴"}, "answer": null, "notes": [], "id": 1104}, {"year": 2010, "paper": "Paper 2", "question_number": 101, "question_text": "患者大便色黑如柏油4天, 腹部隠痛, 喜熱飲, 肢倦乏力, 氣短懶言, 舌淡苔薄, 方用", "options": {"A": "黃土湯 脾胃虛寒-健脾溫中,養血止血", "B": "地榆湯 腸道濕熱-清化濕熱,涼血止血", "C": "瀉心湯", "D": "加減清胃散", "E": "瀉白散"}, "answer": null, "notes": [], "id": 1105}, {"year": 2010, "paper": "Paper 2", "question_number": 102, "question_text": "男,中老年。腰酸背痛,遺精陽痿,多尿,面色蒼白,畏寒肢冷,下利清谷, 舌淡胖有齒痕,苔白,脈沉遲。", "options": {"A": "理中丸", "B": "補中益氣湯", "C": "金匱腎氣丸", "D": "左歸丸", "E": "以上都不是(右歸丸?)"}, "answer": null, "notes": [], "id": 1106}, {"year": 2010, "paper": "Paper 2", "question_number": 103, "question_text": "中年人, 男, 外傷性腰椎壓縮勻骨折, 現疼痛, 胃納差, 大便秘結, 舌苔薄白, 脈弦, 使用方: (睇書, 我錯左, 因為A 既ANSWER 應該有熱症)", "options": {"A": "桃核承氣湯", "B": "复元活血湯", "C": "大成湯", "D": "XX"}, "answer": null, "notes": [], "id": 1107}, {"year": 2010, "paper": "Paper 2", "question_number": 104, "question_text": "患者, 女,28歲,每月月經來潮前, 小腹脹痛, 脹甚於痛, 經行不暢, 月經量少,偶 夾血塊,伴胸脅、乳房脹痛,舌質紫黯邊有瘀班,脈沉澀, 其治療首選:", "options": {"A": "中極、水道、歸來", "B": "氣海、太衝、三陰交", "C": "肝俞、腎俞、關元", "D": "關元、照海、足三里", "E": "命門、次髎、歸來"}, "answer": null, "notes": ["答案不肯定。五版針灸 p.248:痛經實証用 中極、次髎、地機"], "id": 1108}, {"year": 2010, "paper": "Paper 2", "question_number": 105, "question_text": "患者脅痛,以脹痛為主,走竄不定,疼痛每因情志而增減,胸悶氣短,飲食減 少,噯氣頻作,苔薄,脈弦。治法宜:", "options": {"A": "疏肝理氣", "B": "疏肝利膽", "C": "清肝理氣", "D": "疏肝活血", "E": "XXXXX"}, "answer": null, "notes": [], "id": 1109}, {"year": 2010, "paper": "Paper 2", "question_number": 106, "question_text": "患者心神不寧,心煩少寐,頭暈目眩,手足心熱,耳鳴腰痠,舌質紅,少苔或 無苔,脈細數。其治法最宜是________ p114", "options": {"A": "清熱寧心,鎮心安神", "B": "清心安神,鎮驚寧志", "C": "交通心腎,寧心安神", "D": "滋陰清火,養心安神  黃連阿膠湯,朱砂安神丸", "E": "滋陰降火,安神定志"}, "answer": null, "notes": [], "id": 1110}, {"year": 2010, "paper": "Paper 2", "question_number": 107, "question_text": "患兒損傷肘關節疼痛,不敢活動。自攜X 線片報告:前臂及肘關節無骨折及脫 位。說明橫骨幹軸線的延長線通過肱骨小頭的位置是________", "options": {"A": "外緣", "B": "中內 1/3", "C": "中心", "D": "中外 1/3", "E": "內緣"}, "answer": null, "notes": [], "id": 1111}, {"year": 2010, "paper": "Paper 2", "question_number": 108, "question_text": "咳嗽,痰少質黏,時有咯血,血色鮮紅,午後潮熱,五心煩熱,盜汗,口 渴,心,失眠,舌紅苔薄黃,脈細數,該記以下何方:", "options": {"A": "月華丸  肺癆-肺陰虧損-滋陰潤肺", "B": "百合固金丸 肺癆-陰虛火旺-滋陰降火", "C": "保真湯  肺癆-氣陰耗傷-益氣養陰", "D": "補天大造丸  肺癆-陰陽兩虛-滋陰補陽", "E": "沙參麥冬湯"}, "answer": null, "notes": ["P79"], "id": 1112}, {"year": 2010, "paper": "Paper 2", "question_number": 109, "question_text": "小兒乳食內積應選何藥?", "options": {"A": "雞內金", "B": "山楂", "C": "萊菔子", "D": "谷芽", "E": "麥芽"}, "answer": "A", "notes": [], "id": 1113}, {"year": 2010, "paper": "Paper 2", "question_number": 110, "question_text": "小兒肉食內積應選何藥", "options": {"A": "萊菔子", "B": "山楂", "C": "神曲", "D": "谷芽", "E": "麥芽"}, "answer": null, "notes": [], "id": 1114}, {"year": 2010, "paper": "Paper 2", "question_number": 111, "question_text": "女,孕,陰道出血,伴腰痠,診斷為", "options": {"A": "胎漏", "B": "胎動不安", "C": "胞漏", "D": "兒病", "E": "滑胎"}, "answer": null, "notes": [], "id": 1115}, {"year": 2010, "paper": "Paper 2", "question_number": 112, "question_text": "女,孕50天,前三次懷孕皆在第45天流產,現陰道流血,腰痠,診斷為", "options": {"A": "胎漏", "B": "胎動不安", "C": "胞漏", "D": "兒病", "E": "滑胎"}, "answer": null, "notes": [], "id": 1116}, {"year": 2010, "paper": "Paper 2", "question_number": 113, "question_text": "男,胸痛反復多年,現胸刺痛,痛處固定,夜甚,舌瘀點,脈沉澀,首選方藥", "options": {"A": "血府逐瘀湯", "B": "身痛逐瘀湯", "C": "桃仁紅花煎", "D": "XXXX"}, "answer": null, "notes": [], "id": 1117}, {"year": 2010, "paper": "Paper 2", "question_number": 114, "question_text": "不寐血瘀症?  血府逐瘀湯 (113-114 選擇:桃仁紅花煎  血府逐瘀湯)", "options": {}, "answer": null, "notes": [], "id": 1118}, {"year": 2010, "paper": "Paper 2", "question_number": 115, "question_text": "兒童感冒常夾痰的主因", "options": {"A": "肺常不利", "B": "脾常不足 夾滯", "C": "肝常有餘 夾驚", "D": "氣怯(類似)", "E": "腎虛"}, "answer": null, "notes": [], "id": 1119}, {"year": 2010, "paper": "Paper 2", "question_number": 116, "question_text": "小兒感冒易挾滯的原因是:", "options": {"A": "脾常不足", "B": "肝常有餘", "C": "肺氣不利", "D": "神氣怯弱", "E": "腎常虛"}, "answer": null, "notes": [], "id": 1120}, {"year": 2010, "paper": "Paper 2", "question_number": 117, "question_text": "妊娠初期,嘔吐苦水,胸滿脅脹,舌淡紅,苔蔣黃,脈弦滑。其証侯屬: D", "options": {}, "answer": null, "notes": [], "id": 1121}, {"year": 2010, "paper": "Paper 2", "question_number": 118, "question_text": "妊娠後,口淡,嘔吐不食,舌淡,苔白潤,脈緩滑無力。其証侯屬: E", "options": {"A": "肝經鬱火", "B": "脾虛痰濕", "C": "肝經濕熱", "D": "肝胃不和", "E": "脾胃虛弱"}, "answer": null, "notes": [], "id": 1122}, {"year": 2010, "paper": "Paper 2", "question_number": 119, "question_text": "白術、山藥、人參、白芍、蒼術、車前子、甘草、陳皮、柴胡、荊芥穗是以 下何方的組成﹖完帶湯(脾虛)", "options": {}, "answer": null, "notes": [], "id": 1123}, {"year": 2010, "paper": "Paper 2", "question_number": 120, "question_text": "茯苓、豬苓、澤瀉、赤芍、丹 wer": null, "notes": [], "id": 1224}, {"year": 2011, "paper": "Paper 2", "question_number": 73, "question_text": "患者左側大腿下段受傷後疼痛,腫脹,活動功能障礙。自攜x 片顯示,左側 股骨上踝骨折,骨折線由前上方斜向後下方,屬骨折何型?", "options": {"A": "外展型", "B": "內收型", "C": "粉碎型", "D": "屈曲型 (骨折線由後上斜向前下)", "E": "伸直型"}, "answer": null, "notes": [], "id": 1225}, {"year": 2011, "paper": "Paper 2", "question_number": 74, "question_text": "患者心胸痺痛,甚則胸痛貫背,畏寒肢冷,面色倉白,唇舌淡白,舌色紫暗, 脈沉弱或沉微欲絕。應如何治療?", "options": {"A": "瓜蔞薤白半夏湯 (痰濁)", "B": "瓜蔞薤白白酒湯 (陰寒)", "C": "右歸丸合參附湯 (陽氣虛衰)", "D": "左歸丸合生脈散", "E": "左歸丸合金匱腎氣丸"}, "answer": null, "notes": [], "id": 1226}, {"year": 2011, "paper": "Paper 2", "question_number": 75, "question_text": "患者頭痛十年,隱隱作痛,面色少華,勞累後加重。舌淡,脈細弱。其證屬", "options": {"A": "風邪襲絡", "B": "痰濕中阻", "C": "肝陽上亢", "D": "氣虛", "E": "氣血虧虛"}, "answer": null, "notes": [], "id": 1227}, {"year": 2011, "paper": "Paper 2", "question_number": 76, "question_text": "患者左側上肢麻木疼痛,咳嗽噴嚏後加重。查體,術者一手拿住患者左手, 外展90 度,一手按住頸部左側,兩手作反方向牽拉時感左上肢麻木疼痛。應作 何種診斷?", "options": {"A": "肩關節周圍炎", "B": "痺痛型頸椎病", "C": "崗上肌腱炎", "D": "肱二頭肌長頭肌腱炎", "E": "肩峰下滑囊炎"}, "answer": null, "notes": [], "id": 1228}, {"year": 2011, "paper": "Paper 2", "question_number": 77, "question_text": "患者,女,50 歲。咽中如有物阻,吞之不下,吐之不出。胸悶,脘腹脹滿, 舌苔薄膩,脈弦。針刺隨神門,內關,人中外,應配以下那些穴位?", "options": {"A": "豐隆,大陵,隱白", "B": "豐隆,肝俞,腎俞", "C": "豐隆,湧泉,天突", "D": "少商,太淵,天突", "E": "神門,太冲,太溪"}, "answer": null, "notes": [], "id": 1229}, {"year": 2011, "paper": "Paper 2", "question_number": 78, "question_text": "小兒全身浮腫,頭面臉腫甚,光亮,按之即起,治則:", "options": {"A": "溫陽利水", "B": "溫補脾腎", "C": "疏風利水", "D": "瀉肺利水"}, "answer": null, "notes": [], "id": 1230}, {"year": 2011, "paper": "Paper 2", "question_number": 79, "question_text": "左內踝扭傷,外翻痛甚,X RAY 示無骨折。應固定於:", "options": {"A": "蹠屈 XX 位", "B": "背伸 XX 位", "C": "背伸 XX 位", "D": "中立外翻位", "E": "中立內翻位"}, "answer": null, "notes": [], "id": 1231}, {"year": 2011, "paper": "Paper 2", "question_number": 80, "question_text": "月經先期,量多,色紅色稠,便秘,小便赤。治則:", "options": {"A": "清熱涼血調經", "B": "滋陰養血調經", "C": "養陰清熱調經", "D": "活血袪瘀調經", "E": "疏肝理氣調經"}, "answer": null, "notes": [], "id": 1232}, {"year": 2011, "paper": "Paper 2", "question_number": 81, "question_text": "患者,男,瀉下紫痢,腹痛劇烈,身熱,脈滑數,苔膩,應用何方?", "options": {"A": "芍藥湯", "B": "白頭翁湯", "C": "葛根芩連湯", "D": "駐車丸", "E": "真武湯"}, "answer": null, "notes": [], "id": 1233}, {"year": 2011, "paper": "Paper 2", "question_number": 82, "question_text": "月經素有先後不定期史,月經量少色淡,神疲易倦,腰酸,舌淡,脈微細。 應用何治法?", "options": {"A": "固陰煎", "B": "逍遙散", "C": "腎氣丸", "D": "左歸丸", "E": "右歸丸"}, "answer": null, "notes": [], "id": 1234}, {"year": 2011, "paper": "Paper 2", "question_number": 85, "question_text": "患者,女,40,帶下量多清稀,終日淋漓不繼,腰痛如折,小腹冷感,小便 頻數清長,夜間尤甚。舌淡,苔薄白,脈沉遲。選方宜", "options": {"A": "右歸丸", "B": "內補丸 (腎陽虛-溫腎培元,固澀止帶)", "C": "止帶方", "D": "完帶湯", "E": "以上皆非"}, "answer": null, "notes": [], "id": 1235}, {"year": 2011, "paper": "Paper 2", "question_number": 86, "question_text": "腰痛隱隱 10 年,脘腹脹滿,腰冷喜溫,喜按,神疲,四肢不溫,舌淡,脈 沉細。", "options": {"A": "針腎俞、腰眼", "B": "灸志室、命門", "C": "針腰陽關、委中刺血拔罐", "D": "針膈俞、次髎", "E": "針腎俞、脾俞"}, "answer": null, "notes": [], "id": 1236}, {"year": 2011, "paper": "Paper 2", "question_number": 87, "question_text": "患兒10 歲,惡寒發熱,流涕,咳嗽2 周。現咳嗽加重,呈陣發性,日輕夜 重,咳畢時有雞樣回聲,舌紅,苔黃膩,脈弦數。治法宜", "options": {"A": "疏風宣肺", "B": "清肺化痰?", "C": "潤肺健脾", "D": "瀉肺鎮咳", "E": "滋陰潤燥"}, "answer": null, "notes": [], "id": 1237}, {"year": 2011, "paper": "Paper 2", "question_number": 88, "question_text": "患者,男,45,一周前始發熱,咳嗽,現小便點滴不通,量少,咽乾欲飲, 苔薄黃,脈數。選方宜", "options": {"A": "八正散", "B": "清肺飲", "C": "導赤散", "D": "代低當丸", "E": "以上皆非"}, "answer": null, "notes": [], "id": 1238}, {"year": 2011, "paper": "Paper 2", "question_number": 89, "question_text": "患者昨日始口角處紅腫熱痛,有一粟粒樣膿頭,根深堅硬,口渴欲飲,脈數。 治療宜", "options": {"A": "提膿祛腐", "B": "生肌收口", "C": "針灸法", "D": "平胬法", "E": "箍圍消毒"}, "answer": null, "notes": [], "id": 1239}, {"year": 2011, "paper": "Paper 2", "question_number": 90, "question_text": "一種發生於皮肉之間的急性化膿性疾患,局部光軟無頭,紅腫熱痛,結塊范 圍多在6~9cm 左右。此為", "options": {"A": "癤", "B": "癰", "C": "疔", "D": "丹毒", "E": "疽"}, "answer": null, "notes": [], "id": 1240}, {"year": 2011, "paper": "Paper 2", "question_number": 91, "question_text": "懷孕 2 個月,跌倒,後感小腹痛,胎動下墜,陰道有小量流血,二便常,脈 滑。(驗孕呈陰性),治法是 益氣養血,固腎安胎。(補氣和血安胎) p104", "options": {}, "answer": null, "notes": [], "id": 1241}, {"year": 2011, "paper": "Paper 2", "question_number": 92, "question_text": "女,40 歲,沒有來經超過 6 個月,五心煩熱,口幹,脈細數。 應用何方", "options": {"A": "加減一陰煎(陰虛血燥)", "B": "左歸丸", "C": "六味地黃丸", "D": "人參養榮丸(氣血虛弱)", "E": "兩地湯"}, "answer": null, "notes": [], "id": 1242}, {"year": 2011, "paper": "Paper 2", "question_number": 93, "question_text": "男童,咳喘,痰多,痰黃,舌紅,苔厚膩,脈滑數。是何證形", "options": {"A": "風寒", "B": "風熱", "C": "風寒夾痰", "D": "風熱夾痰", "E": "痰熱"}, "answer": null, "notes": [], "id": 1243}, {"year": 2011, "paper": "Paper 2", "question_number": 94, "question_text": "呃逆,沖逆而出,口臭煩渴,多喜飲冷,脘腹滿悶,大便秘結,小便短赤, 苔黃燥,脈滑數。治法是: 清熱和胃, 降逆止呃。", "options": {}, "answer": null, "notes": [], "id": 1244}, {"year": 2011, "paper": "Paper 2", "question_number": 95, "question_text": "婦人,失眠,心煩暴易驚,主穴為", "options": {"A": "心俞、脾俞、厥陰俞", "B": "心俞、胆俞、大陵(答案)", "C": "心俞、太溪、腎俞", "D": "太沖、行間、俠溪", "E": "胃俞、足三里"}, "answer": null, "notes": [], "id": 1245}, {"year": 2011, "paper": "Paper 2", "question_number": 96, "question_text": "婦人,痛經,腹痛感寒尤劇,沉弦,症型有", "options": {"A": "氣滯血瘀", "B": "血瘀阻絡", "C": "濕熱下注", "D": "寒濕凝滯(答案)", "E": "以上都不是"}, "answer": null, "notes": [], "id": 1246}, {"year": 2011, "paper": "Paper 2", "question_number": 97, "question_text": "女,32 歲。帶下量多一週,黃綠相兼,質色粘稠,呈泡沫狀,味臭難聞, 煩躁易怒,口苦咽干。舌紅苔黃膩,脈弦滑。是什麼證型?", "options": {"A": "濕蘊化熱", "B": "陰虛夾濕", "C": "濕熱下注 (婦科學第7 版,186 頁)", "D": "熱毒蘊結", "E": "腎虛濕困"}, "answer": null, "notes": [], "id": 1247}, {"year": 2011, "paper": "Paper 2", "question_number": 98, "question_text": "婦女,47 歲。近日外陰瘙癢甚,帶下量多,色赤白相兼,質粘稠,呈豆渣 樣,小腹作痛。並見口苦口膩,小便短赤,舌紅苔黃膩,脈滑數。治法是什麼:", "options": {"A": "健脾益氣,升陽除濕", "B": "清利濕熱,解毒殺蟲 (婦科學第7 版,186 頁)", "C": "溫腎培元,固澀止帶", "D": "清熱解毒,利水滲濕", "E": "滋腎益陰,清熱利濕"}, "answer": null, "notes": [], "id": 1248}, {"year": 2011, "paper": "Paper 2", "question_number": 99, "question_text": "一年青婦女,左股骨干開放性骨折後,創口日久不歛,流溢清稀脓水,神疲 乏力,舌淡,脈細無力。", "options": {"A": "八珍湯", "B": "四物湯", "C": "四君子湯", "D": "續骨活血湯", "E": "補腎壯筋湯"}, "answer": null, "notes": ["但可參考:", "景嶽全書 -- 卷之四十六聖集外科鈐上", "生肌收口附成漏證二十一", "丹溪亦謂治瘡瘍當助胃壯氣,使根本堅固。 誠哉是言也,可不慎歟。又曰: 若", "肌肉傷而瘡口不斂,用六君子湯以補脾胃。若氣虛惡寒而瘡口不斂,用補中益氣", "湯以補脾肺。若血虛發熱而瘡口不斂,用四物、參、朮以滋肝脾。若膿多而瘡口", "不斂,用八珍湯或十全大補湯以養血氣;如不應,但用四君,歸、耆以補脾胃;", "更不應,乃屬命門火衰,急用八味丸以壯火生土。"], "id": 1249}, {"year": 2011, "paper": "Paper 2", "question_number": 100, "question_text": "一小兒於雨天跌倒,以手撐地後左手前臂疼痛、腫脹、不能活動。隨即送 往醫院治療,X 光示:左手橈尺骨雙骨折。立即進行復位,並用夾板固定。回 家 當晚即覺傷肢疼痛加重,腫脹明顯,皮膚感覺消失、略紅,膚溫稍高,手指發紺, 此為何因?", "options": {"A": "錯位或錯位加重", "B": "夾板固定鬆脫", "C": "橈神經損傷", "D": "筋膜間隔區綜合征 (骨科學第5 版,127 頁)", "E": "此乃正常的骨折疼痛"}, "answer": null, "notes": [], "id": 1250}, {"year": 2011, "paper": "Paper 2", "question_number": 101, "question_text": "小兒肱骨踝上骨折(屈曲型)復位後,是如何固定:", "options": {"A": "肘關節屈曲120 度4 週", "B": "肘關節屈曲100 度4 週", "C": "肘關節屈曲90 度4 週,再屈曲120 度2 週", "D": "肘關節屈曲60 度2 週,再屈曲90 度2 週 (骨科學第5 版,95 頁)", "E": "肘關節屈曲 60 度 4 週"}, "answer": null, "notes": [], "id": 1251}, {"year": 2011, "paper": "Paper 2", "question_number": 102, "question_text": "股骨幹骨折復位後,多少週開始可以練習抬臀:", "options": {"A": "1 週", "B": "2 週", "C": "3 週", "D": "4 週", "E": "5 週"}, "answer": null, "notes": [], "id": 1252}, {"year": 2011, "paper": "Paper 2", "question_number": 103, "question_text": "月經量多,色淡,質稀,短氣懶言,肢軟無力,脈細弱,方用", "options": {"A": "保陰煎 (血熱-涼血清熱止血)", "B": "歸腎丸", "C": "滋血湯", "D": "舉元煎 (氣虛-補氣攝血固沖)", "E": "歸脾湯"}, "answer": null, "notes": [], "id": 1253}, {"year": 2011, "paper": "Paper 2", "question_number": 104, "question_text": "心悸目眩,胸脘痞滿,形寒肢冷,小便短少,或見下肢浮腫,渴不欲飲, 舌苔白滑,脈弦滑,方用", "options": {"A": "桂枝甘草龍骨牡蠣湯 (心悸-心陽不振-溫補心陽安神定悸)", "B": "苓桂術甘湯 (心悸-水飲凌心-振奮心陽化氣行水)", "C": "真武湯", "D": "理中湯", "E": "金匱腎氣丸"}, "answer": null, "notes": [], "id": 1254}, {"year": 2011, "paper": "Paper 2", "question_number": 105, "question_text": "中風後半身不遂,四肢無力,患肢腫脹,言語騫澀,口眼喎斜,面色萎黃, 舌淡紫,苔薄白,脈細澀無力,治法為", "options": {"A": "養血活血,通經活絡", "B": "祛風養血,通經活絡 (大秦芁湯)", "C": "平肝潛陽,熄風通絡 (鎮肝熄風湯)", "D": "祛風除痰,宣竅通絡", "E": "補氣活血,通經活絡 (補陽還五湯) p211"}, "answer": null, "notes": [], "id": 1255}, {"year": 2011, "paper": "Paper 2", "question_number": 106, "question_text": "時值春夏之交,日間活動時或喝熱飲後汗多,睡時汗出可濕透衣物,面色 少華,精神尚可,二便尚可,為", "options": {"A": "表虛不固之汗證", "B": "營衛不和之汗證", "C": "氣陰兩虛之汗證", "D": "生理性出汗", "E": "脾胃濕熱之汗證"}, "answer": null, "notes": [], "id": 1256}, {"year": 2011, "paper": "Paper 2", "question_number": 107, "question_text": "橈骨腫脹,壓痛,縱軸壓痛,活動異常,查片為橈骨遠端骨折。手法復位後 固定", "options": {"A": "1 周", "B": "2-3 周", "C": "4-5 周", "D": "6-8 周", "E": "8-10 周"}, "answer": null, "notes": [], "id": 1257}, {"year": 2011, "paper": "Paper 2", "question_number": 108, "question_text": "胃痛連脅,噯氣綿綿,嘔吐酸苦,脈沉弦,針灸選內關穴作用為", "options": {"A": "寬胸解鬱", "B": "疏通胃氣", "C": "升清降濁", "D": "平沖降逆", "E": "和胃降氣"}, "answer": null, "notes": [], "id": 1258}, {"year": 2011, "paper": "Paper 2", "question_number": 109, "question_text": "男,65 歲,前腺增生史,現見排尿灼痛不利,伴腰酸耳鳴,舌紅苔少脈細 數,治法應為:", "options": {"A": "清熱利濕通淋", "B": "滋腎養陰,清利膀胱", "C": "清熱利濕,通淋排石", "D": "清熱通淋,涼血止血", "E": "清熱利濕,分清別濁"}, "answer": null, "notes": [], "id": 1259}, {"year": 2011, "paper": "Paper 2", "question_number": 110, "question_text": "女,35 歲,訴乳房脹痛,經前甚,經後減;經量少,帶下清,乳房可觸條 索狀增生,脈弦滑,本例証型為:", "options": {"A": "肝氣鬱結", "B": "肝鬱痰凝", "C": "血瘀痰凝", "D": "沖任失調", "E": "氣滯血瘀"}, "answer": null, "notes": [], "id": 1260}, {"year": 2011, "paper": "Paper 2", "question_number": 111, "question_text": "虛勞患者,自覺腰酸,眩暈,耳鳴,口乾咽痛,脈沉弱,其証型為:", "options": {"A": "腎陰虛", "B": "腎陽虛", "C": "肝陰虛", "D": "肝血虛", "E": "氣血虛"}, "answer": null, "notes": [], "id": 1261}, {"year": 2011, "paper": "Paper 2", "question_number": 112, "question_text": "男,小便不利,澀痛多年,隨情志而作,伴小腹脹痛,脈弦,方用:", "options": {"A": "無比山藥丸", "B": "萆薢分清飲", "C": "沉香散", "D": "柴胡疏肝散", "E": "八正散"}, "answer": null, "notes": [], "id": 1262}, {"year": 2011, "paper": "Paper 2", "question_number": 113, "question_text": "男,小便點滴不下,熱、澀痛,脈滑數,苔黃膩,其診斷為:", "options": {"A": "淋証,熱淋", "B": "淋証,氣淋", "C": "癃閉,膀胱濕熱", "D": "癃閉,肝氣鬱滯", "E": "癃閉,肺熱壅盛"}, "answer": null, "notes": [], "id": 1263}, {"year": 2011, "paper": "Paper 2", "question_number": 114, "question_text": "男,尿末有白濁液出,其尿黃濁,小腹、會陰、骶部脹痛,莖中熱痛,方 用:", "options": {"A": "大分清飲 (前列腺炎-濕熱)", "B": "前列腺湯 (氣血瘀滯)", "C": "萆薢分清飲", "D": "八正散", "E": "知柏地黃湯"}, "answer": null, "notes": [], "id": 1264}, {"year": 2011, "paper": "Paper 2", "question_number": 116, "question_text": "患儿 1 天来暴泻不止,便稀如水,面色苍白,四肢厥冷,冷汗自出。其证 候是", "options": {"A": "风寒泻", "B": "脾虚泻", "C": "脾肾阳虚泻", "D": "泄泻伤阳", "E": "泄泻伤阴"}, "answer": null, "notes": [], "id": 1265}, {"year": 2011, "paper": "Paper 2", "question_number": 117, "question_text": "患者小便热涩刺痛,尿色深红,夹有血块,心烦,舌苔黄,脉滑数。其治法 是:", "options": {"A": "清热泻火,利湿通淋", "B": "滋阴清热,补虚止血(血淋虛證)", "C": "化瘀通淋,凉血止血", "D": "清热通淋,凉血止血(血淋實證)", "E": "清热利湿,通淋排石"}, "answer": null, "notes": [], "id": 1266}, {"year": 2011, "paper": "Paper 2", "question_number": 118, "question_text": "患者平素眩晕,耳鸣。突然发生口舌歪斜,舌强语謇,半身不遂,但其神志 清楚,舌红,脉弦滑。治疗应选:", "options": {"A": "大秦艽汤", "B": "镇肝熄风汤", "C": "龙胆泻肝汤", "D": "地黄饮子", "E": "苏合香丸."}, "answer": null, "notes": [], "id": 1267}, {"year": 2011, "paper": "Paper 2", "question_number": 119, "question_text": "患儿,3 岁。面色少华,不思纳食,形体偏瘦,舌淡苔薄白。其治法是:", "options": {"A": "健脾化湿", "B": "健脾和胃", "C": "疏肝和胃", "D": "消食导滞", "E": "和脾助运"}, "answer": null, "notes": [], "id": 1268}, {"year": 2011, "paper": "Paper 2", "question_number": 120, "question_text": "患者小便混濁,置之沉澱,混有血液,尿道熱澀疼痛,舌紅,苔黃膩,脈 濡次數", "options": {"A": "尿血", "B": "血淋", "C": "尿濁", "D": "癃閉", "E": "以上皆非"}, "answer": null, "notes": [], "id": 1269}, {"year": 2011, "paper": "Paper 2", "question_number": 121, "question_text": "脅痛, 瘀甚, 方用:", "options": {"A": "旋覆花湯", "B": "鱉甲煎丸", "C": "血府逐瘀湯", "D": "復元活血湯", "E": "XXXXX"}, "answer": null, "notes": [], "id": 1270}, {"year": 2011, "paper": "Paper 2", "question_number": 122, "question_text": "踝扭傷固定多少周", "options": {"A": "1-2", "B": "2-3", "C": "4-6", "D": "7-9", "E": "10-11"}, "answer": null, "notes": [], "id": 1271}, {"year": 2011, "paper": "Paper 2", "question_number": 1 以致下虛上實,經氣閉塞,最佳治方是:", "options": {"A": "耳聾左慈丸合半夏白朮天麻湯", "B": "耳聾左慈丸合六味地黃丸", "C": "益氣聰明湯合黑錫丹", "D": "貞元飲合黑錫丹", "E": "滋水清肝飲合本事地黃湯"}, "answer": "E", "notes": ["若腎虧復為外風所乘,以致下虛上實,經氣閉塞,頭痛口乾者,可合用本事地黃湯,", "滋陰疏風並舉。 (五版《中醫內科學》P. 262)"], "id": 2622}, {"year": 2016, "paper": "Paper 2", "question_number": 16, "question_text": "患者陰部腫塊,不紅不熱,經久不消,神疲體倦,納穀不香,舌質淡嫩,舌苔淡 黃膩,脈細軟無力。問治法【肯定證狀描述無誤】", "options": {"A": "益氣養血,托毒外出", "B": "溫經散寒,化痰養榮", "C": "溫經散寒,活血化瘀", "D": "散寒袪濕,化瘀消腫", "E": "健脾溫陽,化濕袪痰"}, "answer": "A", "notes": ["※參考:五版婦科165頁", "陰瘡--寒凝--證候:腫塊堅硬,皮色不變,不甚腫痛,經久不消。又或日久潰爛,搔", "癢出血,膿水淋瀝,瘡久不斂,神疲體倦,納穀不香,心悸煩躁。舌淡嫩,苔淡黃", "膩,脈細軟無力。治法:益氣養血,托毒外出。方用:托裡消毒散。………下 4 行…", "若陽虛寒凝,證見陰戶一側腫脹結塊,不紅不熱,狀如蠶繭,經久不消者,治當溫經", "散寒,化痰養榮,陽和湯合小金丹治之。【描述相近,小心辨證】"], "id": 2623}, {"year": 2016, "paper": "Paper 2", "question_number": 17, "question_text": "體表某些局部病痛,治療時,取穴原則是", "options": {"A": "近部取穴", "B": "本經取穴", "C": "對證取穴", "D": "遠部取穴", "E": "經驗取穴"}, "answer": "A", "notes": ["建議答案:A", "※參考:五版針灸學202頁"], "id": 2624}, {"year": 2016, "paper": "Paper 2", "question_number": 18, "question_text": "第3胸椎棘突下,旁開1.5寸。", "options": {"A": "肺俞", "B": "心俞", "C": "膈俞", "D": "肝俞", "E": "胃俞"}, "answer": "A", "notes": ["※參考:五版針灸學66頁"], "id": 2625}, {"year": 2016, "paper": "Paper 2", "question_number": 19, "question_text": "第7胸椎棘突下旁開1.5寸的穴位?", "options": {"A": "肺俞", "B": "肝俞", "C": "膈俞", "D": "心俞", "E": "腎俞"}, "answer": "C", "notes": [], "id": 2626}, {"year": 2016, "paper": "Paper 2", "question_number": 20, "question_text": "第2腰椎棘突下旁開1.5寸的穴位?", "options": {"A": "大椎", "B": "陶道", "C": "至陽", "D": "脊中", "E": "命門"}, "answer": "E", "notes": [], "id": 2627}, {"year": 2016, "paper": "Paper 2", "question_number": 21, "question_text": "眩暈,精神痿糜,少寐多夢,健忘,腰膝痠痛,五心煩熱,舌紅,脈數者,最佳 冶法為:", "options": {"A": "滋陰降火", "B": "補腎滋陰", "C": "補腎助陽", "D": "滋陰潛陽", "E": "以上皆非"}, "answer": "B", "notes": [], "id": 2628}, {"year": 2016, "paper": "Paper 2", "question_number": 22, "question_text": "治療頸前肉塊, 能隨吞咽上下移動是那項", "options": {"A": "四海舒郁丸", "B": "梔子清肝湯", "C": "海藻玉壺湯", "D": "牛蒡解肌湯", "E": "藻藥散"}, "answer": "C", "notes": ["癭病腫塊較局限而柔韌者,稱為肉癭。其特徵為頸前結喉一側或雙側結塊柔韌而圓,", "如肉之團,按之能隨吞動作上下移動。", "內治宜理氣解鬱,化痰軟堅,用海藻玉壺湯加減。(五版《中醫外科學》P. 97, 98 )"], "id": 2629}, {"year": 2016, "paper": "Paper 2", "question_number": 23, "question_text": "頭上有紅色皮疹, 頭髮結成簇但不脫髮, 有少量白屑是下列那項", "options": {"A": "肥瘡", "B": "白禿瘡", "C": "白疕", "D": "疥瘡", "E": "牛皮癬"}, "answer": "C", "notes": ["肥瘡--初起紅色丘疹,或有膿疱,乾後結痂,顏色蠟黃。蔓延擴大,形如黃豆。外觀", "呈蝶形,邊緣稍隆起,中央微凹陷,毛髮從中貫穿,稱為黃癬痂...頭髮乾燥,失去光", "澤,散在脫落,日久痊愈癒,留有萎縮性疤痕。其上殘存少數毛髮,雖不折斷,但易", "於拔除。(五版《中醫外科學》P. 128 )", "白禿瘡--初起兵疹色紅,灰白色鱗屑成斑,小者如豆,大者如錢,日久蔓延,擴大成", "片。毛髮乾枯,容易折斷,易於拔落,而不疼痛。(五版《中醫外科學》P. 127 )", "白疕--長於頭皮部的皮疹呈暗紅色,覆有灰白色較厚的鱗屑,把頭髮簇集成束狀,但", "不脫髮。(五版《中醫外科學》P. 148)"], "id": 2630}, {"year": 2016, "paper": "Paper 2", "question_number": 24, "question_text": "治療乳腺增生之衝任不調應選下列那項", "options": {"A": "逍遙蔞貝散", "B": "二仙湯合四物湯", "C": "神效瓜蔞散", "D": "六味地黃丸合青蒿鱉甲湯", "E": "右歸丸合小金片"}, "answer": "B", "notes": ["乳腺增生病衝任失調--治宜調理衝任,溫陽化痰,宜二仙湯合四物湯或合十全大補湯", "加減。(五版《中醫外科學》P. 92)"], "id": 2631}, {"year": 2016, "paper": "Paper 2", "question_number": 25, "question_text": "月經病治療原則", "options": {"A": "調理氣血", "B": "調理衝任", "C": "重在調經", "D": "滋養肝腎", "E": "疏肝養血"}, "answer": "C", "notes": [], "id": 2632}, {"year": 2016, "paper": "Paper 2", "question_number": 26, "question_text": "患者,女,18,月經每40-50天一行,量少,色淡,質清稀,小腹隱痛,喜溫喜 按,腰痠無力,小便清長,舌淡,苔白,脈細弱,其證候是:", "options": {"A": "血寒", "B": "腎陰虛", "C": "血虛", "D": "虛寒", "E": "氣滯"}, "answer": "D", "notes": [], "id": 2633}, {"year": 2016, "paper": "Paper 2", "question_number": 27, "question_text": "胎黃寒濕阻滯,宜選:", "options": {"A": "蒿芩清膽湯", "B": "梔子柏皮湯", "C": "茵陳蒿湯", "D": "茵陳理中湯", "E": "血府逐瘀湯"}, "answer": "D", "notes": [], "id": 2634}, {"year": 2016, "paper": "Paper 2", "question_number": 28, "question_text": "以下哪項不是痄腮的特徵:", "options": {"A": "耳垂下腮部漫腫疼痛", "B": "腫脹邊界不清,表皮不紅", "C": "大齡兒童易引發陰囊腫痛", "E": "病情嚴重,擠壓腮腺管口處可擠出膿液"}, "answer": "E", "notes": ["痄腮辨證論治--本病有痄腮接觸史。發生腮腫前可有輕度發熱、頭痛、嘔吐等症狀。", "腮部腫脹部位,一側或兩側均可發生,其特點是以耳垂為中心漫腫,邊緣不清楚,外", "表皮膚不紅,觸之有壓痛及彈性感,張口不利,咀嚼疼痛,腮腺管口可見紅腫。腮頜", "腫脹約持續4 - 5天開始消退,整個病程約1 - 2周。", "足厥陰之脈循少腹絡陰器,若受邪較", "重,較大兒童可並發少腹痛,睪丸腫痛。"], "id": 2635}, {"year": 2016, "paper": "Paper 2", "question_number": 29, "question_text": "小兒感冒容易夾痰的原因", "options": {"A": "脾常不足", "B": "肝常有餘", "C": "神氣怯弱", "D": "肺失清肅", "E": "腎常虛"}, "answer": "D", "notes": ["肺臟受邪,失於清肅,氣機不利,津液凝聚成痰,以致痰阻氣道,故可見咳嗽加劇,", "喉間有痰聲,此為感冒挾痰。(五版《中醫兒科學》P. 83)"], "id": 2636}, {"year": 2016, "paper": "Paper 2", "question_number": 30, "question_text": "治療虛火喉痹,肺虛氣証宜用何方?", "options": {"A": "疏風清熱湯", "B": "六君子湯", "C": "清咽利膈湯", "D": "養陰清肺湯", "E": "知柏地黃湯"}, "answer": "D", "notes": [], "id": 2637}, {"year": 2016, "paper": "Paper 2", "question_number": 31, "question_text": "以下哪項在鑒別哮與喘時無實際意義", "options": {"A": "有無宿根", "B": "喉中有無痰鳴音", "C": "哮必兼喘", "D": "喘未必典哮", "E": "呼吸急促"}, "answer": "E", "notes": [], "id": 2638}, {"year": 2016, "paper": "Paper 2", "question_number": 32, "question_text": "寒凝痰滯的胸痹所用的方藥", "options": {"A": "人參養榮湯", "B": "栝蔞薤白白酒湯 (陰寒凝滯)", "C": "左歸飲(心腎陰虛)", "D": "右歸飲合參附湯 (陽氣虛衰)", "E": "獨參湯"}, "answer": "B", "notes": [], "id": 2639}, {"year": 2016, "paper": "Paper 2", "question_number": 33, "question_text": "以下哪個為腹痛常出現的的病機不包括:", "options": {"A": "外邪內阻", "B": "飲食停滯", "C": "情志不暢", "D": "陰虛火旺", "E": "陽虛內寒"}, "answer": "D", "notes": ["腹痛証型--寒邪內阻、濕熱壅滯、中虛臟寒、飲食積滯、氣滯血瘀 (五版《中醫內科", "學》 P. 167)"], "id": 2640}, {"year": 2016, "paper": "Paper 2", "question_number": 34, "question_text": "痰熱鬱肺的喘證所用的方", "options": {"A": "麻杏石甘湯", "B": "小青龍湯合石膏", "C": "桑白皮湯", "D": "瀉白散合黛蛤散", "E": "青金化痰湯"}, "answer": "C", "notes": [], "id": 2641}, {"year": 2016, "paper": "Paper 2", "question_number": 35, "question_text": "患者,女,19歲。月經不調,週期19-20天,量多,色紫紅,質稠。面赤,心煩 口渴,尿黃便結,舌紅苔黃,脈滑數有力。治療應首選", "options": {"A": "丹梔逍遙散", "B": "清熱固經湯", "C": "清熱調血湯", "D": "清經散", "E": "兩地湯"}, "answer": "D", "notes": ["月經周期提前7 天以上,甚至十餘天一行者稱為「月經先期」(五版《中醫婦科學》P. 36)", "月經先期-虛熱:兩地湯《傅青主女科》 (五版《中醫婦科學》P. 39)"], "id": 2642}, {"year": 2016, "paper": "Paper 2", "question_number": 36, "question_text": "治療濕熱瀉的首選方劑是", "options": {"A": "藿香正氣散", "B": "白頭翁湯", "C": "連理湯", "D": "葛根芩連湯", "E": "芍藥湯"}, "answer": "D", "notes": [], "id": 2643}, {"year": 2016, "paper": "Paper 2", "question_number": 37, "question_text": "下列哪一項不是水痘皮疹的特點?", "options": {"A": "疱疹透明,皮薄如水泡,呈楕圓形", "B": "疱疹根基紅暈,有癢感", "C": "分批透發,故丘疹、疱疹、痂疹可同時存在", "D": "口腔黏膜、眼結膜也可見疱疹", "E": "愈後可留下皮膚瘢痕"}, "answer": "E", "notes": ["水痘辨證論治--本病有與水痘患者接觸史,皮膚上出現明亮如露珠般水泡,水泡呈橢", "圓形,大小不一,周圍有紅暈,有癢感,疱疹分批出現,伴有發熱、咳嗽等輕微上呼", "吸道症狀。檢查時見丘疹、疱疹、結痂同時存在,口腔黏膜、眼結合膜也可出現類似", "疱疹,疱疹分布以軀幹為主。"], "id": 2644}, {"year": 2016, "paper": "Paper 2", "question_number": 38, "question_text": "小兒全身浮腫1 週…皮膚光亮…現頭痛,眩暈,視物模糊,…抽搐、昏迷,舌質 紅,苔黃糙,脈弦。何證型 A.", "options": {"B": "水氣上凌心肺", "C": "邪陷心肝", "D": "水毒內閉"}, "answer": "C", "notes": ["邪陷心肝--頭痛,眩暈,視物模糊,煩躁,甚或抽搐、昏迷,舌質紅、苔黃糙,脈弦", "水毒內閉--全身浮腫,尿少或尿閉,頭暈,頭痛,噁心,嘔吐,甚或昏迷,舌苔膩,", "脈弦 (五版《中醫婦科學》P. 81, 82)"], "id": 2645}, {"year": 2016, "paper": "Paper 2", "question_number": 39, "question_text": "成人肱骨幹骨折固定時間 A.", "options": {"B": "3 - 5周", "C": "6 - 8周", "D": "8 -12周"}, "answer": "C", "notes": ["肱骨幹骨折--固定時間成人約 6 - 8 周,兒童約 3 - 5 周。 (五版《中醫傷科學》P. 91)"], "id": 2646}, {"year": 2016, "paper": "Paper 2", "question_number": 40, "question_text": "肱骨外科頸骨折,骨折處斷端外側嵌插,而內側分離,向前、向內側突起成角… 屬何型骨折", "options": {"A": "伸直型骨折", "B": "屈曲型骨折", "C": "外展型骨折", "D": "內收型骨折"}, "answer": "C", "notes": [], "id": 2647}, {"year": 2016, "paper": "Paper 2", "question_number": 41, "question_text": "從耳後縫間、耳前或耳郭常見的外科疾病是什麼?", "options": {"A": "膿耳", "B": "旋耳瘡", "C": "耳癤", "D": "耳瘡", "E": "耳痰"}, "answer": "B", "notes": ["外耳炎就是外耳道感染的炎症,局限性即「耳癤」,中醫上稱「耳疔」。 (維基百科-外", "耳炎)", "耳瘡是指外耳道的瀰漫性紅腫瘡瘍,以外耳道瀰漫性紅腫、潰瘍、滲液等為特徵。相當於", "西醫的瀰漫性外耳道炎。 (維基百科-耳瘡)", "旋耳瘡是指旋繞耳周而發的瘡瘍。多發於耳後縫間、耳前或耳廓,以局部潮紅、水泡、糜", "爛、結痂及皸裂為主要特徵,患處有灼熱、瘙癢、疼痛感。相當於西醫的外耳濕疹。 (維", "基百科-旋耳瘡)"], "id": 2648}, {"year": 2016, "paper": "Paper 2", "question_number": 42, "question_text": "心膽氣虛的不寐,宜用", "options": {"A": "六君子湯", "B": "天王補心丹", "C": "安神定志丸", "D": "歸脾湯", "E": "溫膽湯"}, "answer": "C", "notes": [], "id": 2649}, {"year": 2016, "paper": "Paper 2", "question_number": 43, "question_text": "泄瀉的肝氣 s": ["若濕熱蘊積,尿液受其煎熬,日積月累,尿中雜質結為砂石,則為石淋。 (五版《中醫", "內科學》P. 233)"], "id": 2658}, {"year": 2016, "paper": "Paper 2", "question_number": 52, "question_text": "患者身熱, 微惡風, 汗少,頭昏重脹痛,痰少而粘,鼻流濁涕,心煩,口渴,舌 苔薄黃而膩,脈濡數", "options": {"A": "銀翹散", "B": "桑菊飲", "C": "新加香薷飲", "D": "桑白皮湯", "E": "藿香正氣散"}, "answer": "C", "notes": ["感冒暑熱證--身熱,微惡風,汗少,肢體酸重或疼痛,頭昏重脹痛,咳嗽痰黏,鼻流", "濁涕,心煩,口渴,或口中黏膩,渴不多飲,胸悶,泛噁,小便短赤,舌苔薄黃而", "膩,脈濡數。 (五版《中醫內科學》P. 40)"], "id": 2659}, {"year": 2016, "paper": "Paper 2", "question_number": 53, "question_text": "缺", "options": {}, "answer": null, "notes": [], "id": 2660}, {"year": 2016, "paper": "Paper 2", "question_number": 54, "question_text": "缺", "options": {}, "answer": null, "notes": [], "id": 2661}, {"year": 2016, "paper": "Paper 2", "question_number": 55, "question_text": "水腫濕熱壅盛証主方為:", "options": {"A": "越婢加朮湯", "B": "實脾飲", "C": "五皮飲", "D": "疏鑿飲子", "E": "胃苓湯"}, "answer": "D", "notes": [], "id": 2662}, {"year": 2016, "paper": "Paper 2", "question_number": 56, "question_text": "濕瘡起病緩慢,皮捐損以丘疹、皰疹為主,滋水較多,倦怠乏力,納呆,大便 溏,小便清長,苔白膩,脈弦滑,該用何方:", "options": {"A": "萆薢滲濕湯", "B": "龍膽瀉肝湯", "C": "除濕胃苓湯", "D": "涼血四物湯", "E": "黃連解毒湯"}, "answer": "C", "notes": ["濕熱證:急性者較多見,表現為潮紅、腫脹、糜爛、流滋、浸淫成片,結痂、瘙癢不", "堪,或伴有大便秘結、小溲短赤、苔黃膩、脈滑數等症狀。若起病較慢,皮損以丘", "疹、丘疱疹為主,滋水較多,或伴有倦怠乏力、納呆、大便不乾或溏、小溲清長、苔", "白膩、脈弦滑等症狀,此濕重於熱。", "濕熱證--宜清熱利濕為主,用龍膽瀉肝湯、萆薢滲濕湯合二妙丸加減。濕重於熱者,", "宜健脾利濕,佐以清熱,用除濕胃苓湯加減。 (五版《中醫外科學》P. 138)"], "id": 2663}, {"year": 2016, "paper": "Paper 2", "question_number": 57, "question_text": "產後腹痛有那些証型", "options": {"A": "氣虛、血虛、血瘀", "B": "血虛、血瘀", "C": "血熱、血虛", "D": "血寒、血瘀", "E": "血熱、氣虛"}, "answer": "B", "notes": ["本病的發生,主要是氣血運行不暢,遲滯而痛。導致不暢的原因,有血虛和血瘀。 (五", "版《中醫婦科學》P. 132)"], "id": 2664}, {"year": 2016, "paper": "Paper 2", "question_number": 58, "question_text": "骨疳為名是:", "options": {"A": "脾病及肺", "B": "脾病及心", "C": "脾病及腎", "D": "脾病及肝", "E": "脾病及膽"}, "answer": "C", "notes": ["脾病及腎,腎主骨,腎精不足,則骨失所養,久則骨骼畸形,出現「雞胸」、「龜", "背」、肋骨外翻、脊柱傾斜等「骨疳」 (五版《中醫兒科學》P. 60 中段)"], "id": 2665}, {"year": 2016, "paper": "Paper 2", "question_numbe let activeYears  = new Set();
let activePapers = new Set();
let activeAns    = 'all';
let activeId     = null;
let filtered     = [];

// Build year/paper chips
const years  = [...new Set(ALL_QS.map(q=>q.year))].sort();
const papers = [...new Set(ALL_QS.map(q=>q.paper))].sort();

document.getElementById('yearChips').innerHTML =
  years.map(y=>`<div class="chip" data-val="${y}" onclick="toggleChip(this,'year')">${y}</div>`).join('');
document.getElementById('paperChips').innerHTML =
  papers.map(p=>`<div class="chip" data-val="${p}" onclick="toggleChip(this,'paper')">${p}</div>`).join('');

function toggleChip(el, type) {
  el.classList.toggle('active');
  const set = type==='year' ? activeYears : activePapers;
  const val = type==='year' ? parseInt(el.dataset.val) : el.dataset.val;
  set.has(val) ? set.delete(val) : set.add(val);
  applyFilters();
}

function toggleAns(el) {
  document.querySelectorAll('#ansChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  activeAns = el.dataset.ans;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = ALL_QS.filter(item => {
    if (activeYears.size  && !activeYears.has(item.year))   return false;
    if (activePapers.size && !activePapers.has(item.paper)) return false;
    if (activeAns==='yes' && !item.answer) return false;
    if (activeAns==='no'  &&  item.answer) return false;
    if (q) {
      const hay = (item.question_text + ' ' + Object.values(item.options).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('countShown').textContent = filtered.length;
  renderList();
}

function renderList() {
  const list = document.getElementById('qList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No results found</div>'; return;
  }
  list.innerHTML = filtered.map(q => {
    const preview = q.question_text.slice(0,55) + (q.question_text.length>55?'…':'');
    const dot = q.answer
      ? `<div class="ans-dot" title="Answer available"></div>`
      : `<div class="no-ans-dot"></div>`;
    return `<div class="q-item${q.id===activeId?' active':''}" onclick="showDetail(${q.id})" id="li${q.id}">
      ${dot}
      <div style="flex:1">
        <div class="q-num">Q${q.question_number}</div>
        <div class="q-preview">${preview}</div>
        <div class="q-meta-tag">${q.year} · ${q.paper}</div>
      </div>
    </div>`;
  }).join('');
}

function showDetail(id) {
  activeId = id;
  // Highlight in list
  document.querySelectorAll('.q-item').forEach(el=>el.classList.remove('active'));
  const li = document.getElementById('li'+id);
  if (li) li.classList.add('active');

  const q = ALL_QS.find(x=>x.id===id);
  if (!q) return;

  const opts = Object.entries(q.options);
  const optsHtml = opts.length ? `
    <div class="options">
      ${opts.map(([l,t])=>`
        <div class="opt${q.answer===l?' correct':''}">
          <span class="opt-letter">${l}.</span>
          <span>${t}</span>
          ${q.answer===l?' <span style="margin-left:auto;font-size:12px;color:#2d6a2d">✓ 正確答案</span>':''}
        </div>`).join('')}
    </div>` : '<p style="color:var(--text-muted);margin-bottom:16px;font-size:13px">（選項未記錄）</p>';

  const ansBanner = q.answer
    ? `<div class="answer-banner">✓ 答案 Answer: <strong>${q.answer}</strong>
         ${q.options[q.answer] ? '— ' + q.options[q.answer] : ''}</div>`
    : '';

  const notes = q.notes && q.notes.length
    ? `<div class="notes">${q.notes.map(n=>`<p>${n}</p>`).join('')}</div>` : '';

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail">
      <div class="detail-meta">
        <span class="badge">${q.year}</span>
        <span class="badge">${q.paper}</span>
        <span class="badge">Q${q.question_number}</span>
      </div>
      <div class="detail-q">${q.question_text}</div>
      ${optsHtml}
      ${ansBanner}
      ${notes}
    </div>`;
}

// Init
applyFilters();
</script>
